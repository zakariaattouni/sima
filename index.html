<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سِيما (Sima) - المنصة الآمنة لفك شفرات ملامح الوجه</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="سِيما">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2103/2103633.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2 family=Cairo:wght@300;400;600;700;900&family=Reem+Kufi:wght@500;700;900&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                        kufi: ['Reem Kufi', 'serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
        }
        /* تدرج التكثيف اللامع للاسم الزخرفي الذهبي */
        .gold-gradient-text {
            background: linear-gradient(135deg, #BF953F 0%, #FCF6BA 25%, #B38728 50%, #FBF5B7 75%, #AA771C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.15));
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300 min-h-screen">

    <div id="sima-app-root"></div>

    <script type="text/babel">
        const { 
            Sparkles, Upload, Trash2, Check, X, Moon, Sun, RefreshCw, 
            Lock, Settings, User, UserPlus, LogOut, PlusCircle, ScanFace, ShieldAlert
        } = window.lucide || {
            Sparkles: () => <span>✨</span>, Upload: () => <span>📤</span>, Trash2: () => <span>🗑️</span>,
            Moon: () => <span>🌙</span>, Sun: () => <span>☀️</span>, RefreshCw: () => <span>🔄</span>,
            Lock: () => <span>🔒</span>, Settings: () => <span>⚙️</span>, User: () => <span>👤</span>,
            UserPlus: () => <span>👤+</span>, LogOut: () => <span>🚪</span>, Check: () => <span>✓</span>, X: () => <span>✗</span>,
            PlusCircle: () => <span>➕</span>, ScanFace: () => <span>👤</span>, ShieldAlert: () => <span>🛡️</span>
        };

        // مفتاح ملحي عالي السرية والتعقيد لتشفير البيانات وإخفائها التام
        const SECRET_SYSTEM_SALT = "Sima_Secure_Mask_System_2026_Dr_Attouni";

        const firebaseConfig = {
            apiKey: "AIzaSyD08ozxrWCBrbCsx3ayz8Gykyy4Z7v7UEU",
            authDomain: "sima-4378c.firebaseapp.com",
            projectId: "sima-4378c",
            storageBucket: "sima-4378c.firebasestorage.app",
            messagingSenderId: "978988425410",
            appId: "1:978988425410:web:ec6ab58c99fce16cec9b5b",
            measurementId: "G-BVXK2MD439"
        };

        if (firebase.apps.length === 0) {
            firebase.initializeApp(firebaseConfig);
            if ("measurementId" in firebaseConfig) {
                firebase.analytics();
            }
        }

        const LOADING_STEPS = [
            "جاري اكتشاف الوجه وحماية الجلسة...",
            "تشفير البيانات الحيوية المؤقتة...",
            "استخراج النقاط المرجعية للوجه...",
            "تحليل تناسق الملامح الإنسانية...",
            "قياس زوايا الوجه والنسب الذهبية...",
            "صياغة التقرير السلوكي والبنيوي..."
        ];

        // دوال التشفير وفك التشفير اللحظي لإخفاء الـ API Key تماماً
        const maskData = (plainText) => {
            if (!plainText) return '';
            return CryptoJS.AES.encrypt(plainText, SECRET_SYSTEM_SALT).toString();
        };

        const unmaskData = (cipherText) => {
            if (!cipherText) return '';
            try {
                const bytes = CryptoJS.AES.decrypt(cipherText, SECRET_SYSTEM_SALT);
                return bytes.toString(CryptoJS.enc.Utf8);
            } catch (e) {
                return '';
            }
        };

        function SimaApplication() {
            const [darkMode, setDarkMode] = React.useState(false);
            
            // الجلسة المستمرة التلقائية للأعضاء عبر التخزين الدائم
            const [userRole, setUserRole] = React.useState(() => localStorage.getItem('sima_pwa_role') || null);
            const [currentUserName, setCurrentUserName] = React.useState(() => localStorage.getItem('sima_pwa_name') || '');
            const [currentView, setCurrentView] = React.useState('landing'); 
            
            const [deferredPrompt, setDeferredPrompt] = React.useState(null);
            const [showInstallBtn, setShowInstallBtn] = React.useState(false);

            const [adminPasswordInput, setAdminPasswordInput] = React.useState('');
            const [memberNameInput, setMemberNameInput] = React.useState('');
            const [memberPasswordInput, setMemberPasswordInput] = React.useState('');
            
            const [regNameInput, setRegNameInput] = React.useState('');
            const [regPasswordInput, setRegPasswordInput] = React.useState('');

            const [usersList, setUsersList] = React.useState(() => {
                const localData = localStorage.getItem('sima_masked_users');
                return localData ? JSON.parse(localData) : [
                    { name: "تجربة عمار", password: "123", status: "active" }
                ];
            });

            const [keyType, setKeyType] = React.useState(() => localStorage.getItem('sima_key_type') || 'google-ai');
            const [maskedApiKey, setMaskedApiKey] = React.useState(() => {
                // استرجاع المفتاح وهو في حالته المشفرة المحمية
                return localStorage.getItem('sima_api_hidden_mask') || '';
            });

            const [image, setImage] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [loadingStep, setLoadingStep] = React.useState(0);
            const [result, setResult] = React.useState(null);
            const [showAdminPanel, setShowAdminPanel] = React.useState(false);

            React.useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);

            React.useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setShowInstallBtn(true);
                });
            }, []);

            React.useEffect(() => {
                let interval;
                if (loading) {
                    interval = setInterval(() => {
                        setLoadingStep((prev) => (prev + 1) % LOADING_STEPS.length);
                    }, 2000);
                } else {
                    setLoadingStep(0);
                }
                return () => clearInterval(interval);
            }, [loading]);

            const handleInstallApp = async () => {
                if (!deferredPrompt) {
                    alert('للتثبيت على هواتف آيفون: اضغط على زر "مشاركة" ثم اختر "إضافة إلى الشاشة الرئيسية".');
                    return;
                }
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') setShowInstallBtn(false);
                setDeferredPrompt(null);
            };

            const saveUsersToDB = (updatedList) => {
                setUsersList(updatedList);
                localStorage.setItem('sima_masked_users', JSON.stringify(updatedList));
            };

            const handleAdminLogin = () => {
                if (adminPasswordInput === 'salem1959') {
                    setUserRole('admin');
                    setCurrentUserName('المدير العام');
                    localStorage.setItem('sima_pwa_role', 'admin');
                    localStorage.setItem('sima_pwa_name', 'المدير العام');
                    setCurrentView('landing');
                    setAdminPasswordInput('');
                    setShowAdminPanel(true);
                } else {
                    alert('رمز مرور الإدارة العام غير صحيح!');
                }
            };

            const handleMemberLogin = () => {
                const foundUser = usersList.find(u => u.name.trim() === memberNameInput.trim() && u.password === memberPasswordInput);
                
                if (foundUser) {
                    if (foundUser.status === 'pending') {
                        alert('حسابك معلق بانتظار تفعيل وموافقة المدير العام أولاً.');
                        return;
                    }
                    setUserRole('member');
                    setCurrentUserName(foundUser.name);
                    localStorage.setItem('sima_pwa_role', 'member');
                    localStorage.setItem('sima_pwa_name', foundUser.name);
                    setCurrentView('landing');
                    setMemberNameInput('');
                    setMemberPasswordInput('');
                } else {
                    alert('بيانات الدخول غير مطابقة أو لم يتم تفعيل الحساب بعد.');
                }
            };

            const handleRegister = () => {
                if (!regNameInput.trim() || !regPasswordInput) {
                    alert('يرجى ملء الاسم وكلمة السر الكاملة.');
                    return;
                }
                if (usersList.some(u => u.name.trim() === regNameInput.trim())) {
                    alert('هذا الاسم تم تسجيله مسبقاً.');
                    return;
                }

                const updated = [...usersList, { name: regNameInput.trim(), password: regPasswordInput, status: 'pending' }];
                saveUsersToDB(updated);

                alert('تم تقديم طلب التسجيل! الحساب الآن مخفي وبانتظار تفعيل الإدارة.');
                setCurrentView('landing');
                setRegNameInput('');
                setRegPasswordInput('');
            };

            const toggleUserStatus = (name) => {
                const updated = usersList.map(u => u.name === name ? { ...u, status: u.status === 'active' ? 'pending' : 'active' } : u);
                saveUsersToDB(updated);
            };

            const deleteUser = (name) => {
                if(confirm(`حذف نهائي للحساب: ${name}؟`)) {
                    saveUsersToDB(usersList.filter(u => u.name !== name));
                }
            };

            const handleLogout = () => {
                setUserRole(null);
                setCurrentUserName('');
                localStorage.removeItem('sima_pwa_role');
                localStorage.removeItem('sima_pwa_name');
                setCurrentView('landing');
                setShowAdminPanel(false);
            };

            // إدخال وتعمية المفتاح السري فوراً قبل الحفظ ليبقى مخفياً حتى داخل قواعد البيانات
            const handleSaveMaskedKey = (rawKey) => {
                const cipher = maskData(rawKey);
                setMaskedApiKey(cipher);
                localStorage.setItem('sima_api_hidden_mask', cipher);
                localStorage.setItem('sima_key_type', keyType);
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => { setImage(reader.result); setResult(null); };
                    reader.readAsDataURL(file);
                }
            };

            const executeGeminiAnalysis = async () => {
                if (!image) return;
                
                // فك التشفير اللحظي في الخلفية لأغراض معالجة الرابط الآمن فقط
                const realKey = unmaskData(maskedApiKey);
                if (!realKey) {
                    alert('تنبيه النظام: لم يقم المسؤول بإعداد مفتاح الخادم المشفر بعد.');
                    return;
                }

                setLoading(true);
                try {
                    const base64Data = image.split(',')[1];
                    const mimeType = image.split(',')[0].match(/:(.*?);/)[1];

                    const prompt = `
                        قم بتحليل ملامح الوجه في هذه الصورة تحليلاً جمالياً وسلوكياً دقيقاً بناءً على المقاييس الظاهرة فقط.
                        يعاد الناتج بصيغة JSON فقط باللغة العربية.
                        {
                          "beauty": {
                            "score": 85,
                            "summary": "وصف بنيوي متناسق للملامح",
                            "strengths": ["نقطة تميز ملموسة"],
                            "goldenRatio": "وصف للنسب الذهبية وتناسق توزيع عناصر الوجه"،
                            "glow": "نضارة وحيوية الحضور وتقييم البشرة والملامح",
                            "tips": ["نصيحة العناية وجمال الإطلالة"]
                          },
                          "expression": {
                            "expression": "التعبير الحالي الظاهر",
                            "firstImpression": "الانطباع السلوكي المكتشف وعلم الفراسة الحدي"،
                            "traits": ["سمة انفعالية واضحة"],
                            "energy": "مستوى الحضور والطاقة الذهنية والجسدية المنعكسة",
                            "communication": "نمط التواصل المكتشف من العين والشفاه",
                            "suggestions": ["توصية تعبيرية أو نفسية ملهمة"],
                            "message": "رسالة إيجابية فريدة ومحفزة"
                          }
                        }
                    `;

                    let endpoint = keyType === 'google-ai' 
                        ? `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${realKey}`
                        : `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${realKey}`;
                    
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: mimeType, data: base64Data } }] }]
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const rawText = data.candidates[0].content.parts[0].text.trim();
                    const cleanJsonStr = rawText.replace(/^```json\s*/i, '').replace(/```$/, '').trim();
                    setResult(JSON.parse(cleanJsonStr));
                } catch (error) {
                    alert(`فشل التحليل الآمن: ${error.message || 'يرجى مراجعة تشفير المفتاح.'}`);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="relative overflow-x-hidden min-h-screen flex flex-col justify-between">
                    
                    {/* هيدر فاخر: لوجو رقمي، اسم زخرفي ذهبي، وشرح مصغر */}
                    <header className="relative z-10 border-b border-slate-200/50 dark:border-slate-900/60 backdrop-blur-lg bg-white/70 dark:bg-slate-950/70 sticky top-0 px-4 py-3">
                        <div className="max-w-5xl mx-auto flex flex-col sm:flex-row gap-4 justify-between items-center">
                            
                            <div className="flex items-center gap-3 text-center sm:text-right">
                                <div className="w-12 h-12 bg-gradient-to-br from-amber-500 to-yellow-600 rounded-2xl flex items-center justify-center shadow-lg text-white border border-amber-400/20">
                                    <ScanFace className="w-6 h-6 animate-pulse" />
                                </div>
                                <div className="flex flex-col">
                                    <h1 className="font-kufi font-black text-3xl tracking-wide gold-gradient-text leading-none py-1">سِيما</h1>
                                    <p className="text-[10px] md:text-xs text-slate-400 dark:text-slate-500 font-bold mt-0.5">
                                        المنصة الرقمية الآمنة لفك شفرات ملامح الوجه والنسب الجمالية والتحليل السلوكي
                                    </p>
                                </div>
                            </div>

                            <div className="flex items-center gap-2">
                                {showInstallBtn && (
                                    <button onClick={handleInstallApp} className="px-3 py-1.5 rounded-xl bg-emerald-600 text-white text-xs font-black flex items-center gap-1 shadow-md animate-bounce">
                                        <PlusCircle className="w-4 h-4" /> تثبيت التطبيق
                                    </button>
                                )}
                                {userRole === 'admin' && (
                                    <button onClick={() => setShowAdminPanel(!showAdminPanel)} className="p-2 rounded-xl bg-purple-500/10 text-purple-600 border border-purple-500/20 text-xs font-bold flex items-center gap-1">
                                        <Settings className="w-4 h-4" /> لوحة الإدارة
                                    </button>
                                )}
                                {userRole && (
                                    <button onClick={handleLogout} className="p-2 rounded-xl bg-red-500/10 text-red-600 border border-red-500/20 text-xs font-bold flex items-center gap-1">
                                        <LogOut className="w-4 h-4" /> خروج ({currentUserName})
                                    </button>
                                )}
                                <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-xl bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-slate-300">
                                    {darkMode ? <Sun className="w-4 h-4" /> : <Moon className="w-4 h-4" />}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="relative z-10 max-w-4xl mx-auto px-4 py-10 flex-grow w-full flex flex-col items-center justify-center">
                        
                        {/* البوابة الثلاثية للدخول والتسجيل المستمر */}
                        {!userRole && currentView === 'landing' && (
                            <section className="w-full max-w-md bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-6 shadow-xl text-center space-y-6">
                                <div className="space-y-1">
                                    <div className="inline-block p-2 bg-amber-500/10 rounded-full mb-1">
                                        <Sparkles className="w-6 h-6 text-amber-500" />
                                    </div>
                                    <h2 className="text-xl font-extrabold text-slate-800 dark:text-white">بوابة سِيما المشتركة والآمنة</h2>
                                    <p className="text-xs text-slate-400 font-bold">تشفير تام ومعزز لحماية المفاتيح السرية عن المتصفح وقواعد البيانات</p>
                                </div>
                                <div className="grid grid-cols-1 gap-3">
                                    <button onClick={() => setCurrentView('login_member')} className="p-3.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-right font-bold text-sm flex items-center justify-between hover:border-amber-500 transition-all">
                                        <span className="flex items-center gap-2"><User className="w-4 h-4 text-purple-500" /> دخول الأعضاء والمستخدمين</span>
                                        <span className="text-xs text-slate-400">←</span>
                                    </button>
                                    <button onClick={() => setCurrentView('login_admin')} className="p-3.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-right font-bold text-sm flex items-center justify-between hover:border-amber-500 transition-all">
                                        <span className="flex items-center gap-2"><Lock className="w-4 h-4 text-amber-500" /> بوابة التحكم الخاصة بالمدير العام</span>
                                        <span className="text-xs text-slate-400">←</span>
                                    </button>
                                    <button onClick={() => setCurrentView('register')} className="p-3.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-right font-bold text-sm flex items-center justify-between hover:border-amber-500 transition-all">
                                        <span className="flex items-center gap-2"><UserPlus className="w-4 h-4 text-emerald-500" /> طلب عضوية جديدة (مخفية ومعلقة)</span>
                                        <span className="text-xs text-slate-400">←</span>
                                    </button>
                                </div>
                            </section>
                        )}

                        {/* نماذج التبويبات الثلاثية */}
                        {!userRole && currentView === 'login_admin' && (
                            <div className="w-full max-w-sm bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-md space-y-4">
                                <h3 className="font-bold text-base text-amber-500 flex items-center gap-1.5"><Lock className="w-4 h-4" /> دخول الإدارة العام</h3>
                                <input 
                                    type="password" placeholder="أدخل كلمة مرور المدير (salem1959)..." value={adminPasswordInput}
                                    onChange={(e) => setAdminPasswordInput(e.target.value)}
                                    className="w-full px-4 py-2 text-sm bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none"
                                />
                                <div className="flex gap-2">
                                    <button onClick={handleAdminLogin} className="w-full py-2 bg-amber-600 hover:bg-amber-700 text-white font-bold rounded-xl text-xs">تأكيد</button>
                                    <button onClick={() => setCurrentView('landing')} className="w-full py-2 bg-slate-100 dark:bg-slate-950 text-slate-500 font-bold rounded-xl text-xs">إلغاء</button>
                                </div>
                            </div>
                        )}

                        {!userRole && currentView === 'login_member' && (
                            <div className="w-full max-w-sm bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-md space-y-4">
                                <h3 className="font-bold text-base text-purple-600 flex items-center gap-1.5"><User className="w-4 h-4" /> بوابة الأعضاء المعتمدين</h3>
                                <div className="space-y-3">
                                    <input 
                                        type="text" placeholder="الاسم الكامل المسجل..." value={memberNameInput}
                                        onChange={(e) => setMemberNameInput(e.target.value)}
                                        className="w-full px-4 py-2 text-sm bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none"
                                    />
                                    <input 
                                        type="password" placeholder="كلمة السر..." value={memberPasswordInput}
                                        onChange={(e) => setMemberPasswordInput(e.target.value)}
                                        className="w-full px-4 py-2 text-sm bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none"
                                    />
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={handleMemberLogin} className="w-full py-2 bg-amber-600 text-white font-bold rounded-xl text-xs">دخول</button>
                                    <button onClick={() => setCurrentView('landing')} className="w-full py-2 bg-slate-100 dark:bg-slate-950 text-slate-500 font-bold rounded-xl text-xs">رجوع</button>
                                </div>
                            </div>
                        )}

                        {!userRole && currentView === 'register' && (
                            <div className="w-full max-w-sm bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-md space-y-4">
                                <h3 className="font-bold text-base text-emerald-500 flex items-center gap-1.5"><UserPlus className="w-4 h-4" /> طلب عضوية جديدة ومحمية</h3>
                                <div className="space-y-3">
                                    <input 
                                        type="text" placeholder="الاسم الكامل المطلوب..." value={regNameInput}
                                        onChange={(e) => setRegNameInput(e.target.value)}
                                        className="w-full px-4 py-2 text-sm bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none"
                                    />
                                    <input 
                                        type="password" placeholder="اختر كلمة السر..." value={regPasswordInput}
                                        onChange={(e) => setRegPasswordInput(e.target.value)}
                                        className="w-full px-4 py-2 text-sm bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none"
                                    />
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={handleRegister} className="w-full py-2 bg-emerald-600 text-white font-bold rounded-xl text-xs">إرسال الطلب</button>
                                    <button onClick={() => setCurrentView('landing')} className="w-full py-2 bg-slate-100 dark:bg-slate-950 text-slate-500 font-bold rounded-xl text-xs">رجوع</button>
                                </div>
                            </div>
                        )}

                        {/* لوحة تحكم المدير المسؤولة عن تفعيل الأعضاء والمفتاح المعمّى */}
                        {userRole === 'admin' && showAdminPanel && (
                            <section className="w-full bg-white dark:bg-slate-900 border-2 border-amber-500/30 rounded-3xl p-5 mb-6 shadow-md space-y-5 text-right">
                                <div className="border-b border-slate-100 dark:border-slate-800 pb-2 flex justify-between items-center">
                                    <h3 className="font-black text-sm text-amber-600 flex items-center gap-1.5"><Settings className="w-4 h-4" /> لوحة التحكم المشفرة والآمنة</h3>
                                    <span className="text-[9px] px-2 py-0.5 bg-emerald-500/10 text-emerald-600 font-bold rounded-md flex items-center gap-0.5"><ShieldAlert className="w-3 h-3" /> التشفير بالمتصفح نشط</span>
                                </div>
                                
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-slate-50 dark:bg-slate-950 p-4 rounded-2xl border border-slate-200 dark:border-slate-800">
                                    <div>
                                        <span className="block text-[11px] font-bold text-slate-400 mb-1">نوع الربط والمحرك:</span>
                                        <select value={keyType} onChange={(e) => { setKeyType(e.target.value); localStorage.setItem('sima_key_type', e.target.value); }} className="w-full px-3 py-2 text-xs bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl">
                                            <option value="google-ai">مفتاح استوديو الذكاء الاصطناعي (AIza)</option>
                                            <option value="google-cloud">مفاتيح السحابة والمحركات المحدثة الأحدث v1</option>
                                        </select>
                                    </div>
                                    <div>
                                        <span className="block text-[11px] font-bold text-slate-400 mb-1">رمز الـ API (يتم تعميته وتشفيره تلقائياً):</span>
                                        <input 
                                            type="password" placeholder="أدخل المفتاح هنا وسيتم تعميته لحمايته..." 
                                            onChange={(e) => handleSaveMaskedKey(e.target.value)}
                                            className="w-full px-4 py-2 text-xs bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-left font-mono focus:outline-none"
                                        />
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <span className="block text-[11px] font-bold text-slate-400">قائمة تفعيل وحظر حسابات الأعضاء المستقلين:</span>
                                    <div className="overflow-x-auto border border-slate-100 dark:border-slate-800 rounded-xl">
                                        <table className="w-full text-right border-collapse text-xs">
                                            <thead>
                                                <tr className="bg-slate-50 dark:bg-slate-950 text-slate-400 font-bold border-b border-slate-100 dark:border-slate-800">
                                                    <th className="p-3">اسم العضو المسجل</th>
                                                    <th className="p-3">كلمة السر</th>
                                                    <th className="p-3">الحالة</th>
                                                    <th className="p-3 text-center">التحكم الصلاحيات</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {usersList.map((user, idx) => (
                                                    <tr key={idx} className="border-b border-slate-100 dark:border-slate-800 last:border-0 hover:bg-slate-50/50">
                                                        <td className="p-3 font-bold">{user.name}</td>
                                                        <td className="p-3 font-mono text-slate-400">{user.password}</td>
                                                        <td className="p-3">
                                                            <span className={`px-2 py-0.5 rounded-md font-bold text-[10px] ${user.status === 'active' ? 'bg-emerald-500/10 text-emerald-600' : 'bg-amber-500/10 text-amber-600'}`}>
                                                                {user.status === 'active' ? '✔ نشط مفعّل' : '⏳ معلق ومخفي'}
                                                            </span>
                                                        </td>
                                                        <td className="p-3 flex items-center justify-center gap-2">
                                                            <button onClick={() => toggleUserStatus(user.name)} className={`p-1.5 rounded-lg border font-bold text-[10px] flex items-center gap-0.5 ${user.status === 'active' ? 'bg-amber-500/10 text-amber-600 border-amber-500/20' : 'bg-emerald-500/10 text-emerald-600 border-emerald-500/20'}`}>
                                                                {user.status === 'active' ? 'تعليق الحساب' : 'تفعيل الحساب'}
                                                            </button>
                                                            <button onClick={() => deleteUser(user.name)} className="p-1.5 bg-red-500/10 text-red-600 border border-red-500/20 rounded-lg text-[10px]">حذف نهائي</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </section>
                        )}

                        {/* لوحة الفحص الآمنة والمعززة للأعضاء والمدراء */}
                        {userRole && (
                            <div className="w-full space-y-6">
                                <section className="text-center mb-2">
                                    <p className="text-xs font-bold text-slate-500 mt-1">مرحباً بك مجدداً: <span className="text-amber-500 font-black">{currentUserName}</span>. جدار الحماية البيومتري نشط ومستمر بنجاح.</p>
                                </section>

                                <section className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-6 shadow-md">
                                    {!image ? (
                                        <div className="border-2 border-dashed rounded-2xl p-8 text-center cursor-pointer border-slate-300 dark:border-slate-700 hover:border-amber-500 bg-slate-50/50 dark:bg-slate-950/20 relative">
                                            <input type="file" accept="image/*" onChange={handleFileChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                            <div className="w-12 h-12 mx-auto mb-3 bg-amber-500/10 text-amber-600 rounded-full flex items-center justify-center"><Upload className="w-5 h-5" /></div>
                                            <h3 className="text-sm font-bold mb-1">اضغط هنا واطلع الصورة لفك شفرات الملامح وتحليلها</h3>
                                        </div>
                                    ) : (
                                        <div className="relative rounded-2xl overflow-hidden bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800">
                                            <img src={image} alt="Face Preview" className="max-h-[300px] w-full object-contain mx-auto" />
                                            <div className="absolute bottom-4 right-4 left-4 flex justify-between items-center gap-2">
                                                <button onClick={() => { setImage(null); setResult(null); }} className="px-4 py-2 bg-red-600 text-white rounded-xl shadow-md font-bold text-xs flex items-center gap-1.5"><Trash2 className="w-4 h-4" /> حذف الصورة</button>
                                                {!result && !loading && <button onClick={executeGeminiAnalysis} className="px-5 py-2.5 bg-amber-600 hover:bg-amber-700 text-white rounded-xl shadow-lg font-bold flex items-center gap-1.5 text-xs transition-colors"><Sparkles className="w-4 h-4" /> ابدأ التحليل وفك الشفرات</button>}
                                            </div>
                                        </div>
                                    )}
                                </section>

                                {loading && (
                                    <section className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-6 shadow-md text-center">
                                        <RefreshCw className="w-8 h-8 text-amber-500 animate-spin mx-auto mb-2" />
                                        <h3 className="text-sm font-bold mb-1">مصفوفة هندسة المؤشرات الحيوية تعمل الآن</h3>
                                        <p className="text-amber-600 font-bold text-xs">{LOADING_STEPS[loadingStep]}</p>
                                    </section>
                                )}

                                {result && !loading && (
                                    <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-6 shadow-md space-y-4">
                                        <div className="border-b border-slate-100 dark:border-slate-800 pb-3 text-right">
                                            <div className="text-xs font-bold text-amber-600">درجة التناسق التقريبية: {result.beauty.score}/100</div>
                                            <h3 className="text-lg font-bold mt-1">التقرير البنيوي الشامل للوجه</h3>
                                            <p className="text-xs text-slate-600 dark:text-slate-400 mt-1 leading-relaxed">{result.beauty.summary}</p>
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-right">
                                            <div className="p-3 bg-slate-50 dark:bg-slate-950 rounded-xl">
                                                <h4 className="font-bold text-xs text-slate-400 mb-1">النسب الذهبية والتقارب البنيوي</h4>
                                                <p className="text-xs text-slate-600 dark:text-slate-400">{result.beauty.goldenRatio}</p>
                                            </div>
                                            <div className="p-3 bg-slate-50 dark:bg-slate-950 rounded-xl">
                                                <h4 className="font-bold text-xs text-slate-400 mb-1">الانطباع السلوكي الأول المتوقع</h4>
                                                <p className="text-xs text-slate-600 dark:text-slate-400">{result.expression.firstImpression}</p>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                    </main>

                    <footer className="w-full bg-slate-950 text-slate-400 border-t border-slate-900 text-center py-6 px-4 space-y-2 mt-12">
                        <div className="text-xs md:text-sm font-medium text-slate-300">
                            تم التصميم والتطوير بواسطة <span className="text-white font-bold tracking-wide">الدكتور زكريا محمد عطوني</span> © 2026
                        </div>
                    </footer>

                </div>
            );
        }

        const container = document.getElementById('sima-app-root');
        const root = ReactDOM.createRoot(container);
        root.render(<SimaApplication />);
    </script>
</body>
</html>
