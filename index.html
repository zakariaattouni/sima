<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سِيما (Sima) - المنصة الآمنة والموسعة لفك شفرات ملامح الوجه</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="سِيما">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2103/2103633.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&family=Reem+Kufi:wght@600;800;900&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                        kufi: ['Reem Kufi', 'serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }
        /* تدرج التكثيف اللامع للاسم الزخرفي الذهبي */
        .gold-gradient-text {
            background: linear-gradient(135deg, #BF953F 0%, #FCF6BA 25%, #B38728 50%, #FBF5B7 75%, #AA771C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.2));
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-50 transition-colors duration-300 min-h-screen font-bold">

    <div id="sima-app-root"></div>

    <script type="text/babel">
        const { 
            Sparkles, Upload, Trash2, Check, X, Moon, Sun, RefreshCw, 
            Lock, Settings, User, UserPlus, LogOut, PlusCircle, ScanFace, ShieldAlert,
            Eye, Smile, Heart, Star, Compass, Award
        } = window.lucide || {
            Sparkles: () => <span>✨</span>, Upload: () => <span>📤</span>, Trash2: () => <span>🗑️</span>,
            Moon: () => <span>🌙</span>, Sun: () => <span>☀️</span>, RefreshCw: () => <span>🔄</span>,
            Lock: () => <span>🔒</span>, Settings: () => <span>⚙️</span>, User: () => <span>👤</span>,
            UserPlus: () => <span>👤+</span>, LogOut: () => <span>🚪</span>, Check: () => <span>✓</span>, X: () => <span>✗</span>,
            PlusCircle: () => <span>➕</span>, ScanFace: () => <span>👤</span>, ShieldAlert: () => <span>🛡️</span>
        };

        const SECRET_SYSTEM_SALT = "Sima_Secure_Mask_System_2026_Dr_Attouni";

        const firebaseConfig = {
            apiKey: "AIzaSyD08ozxrWCBrbCsx3ayz8Gykyy4Z7v7UEU",
            authDomain: "sima-4378c.firebaseapp.com",
            projectId: "sima-4378c",
            storageBucket: "sima-4378c.firebasestorage.app",
            messagingSenderId: "978988425410",
            appId: "1:978988425410:web:ec6ab58c99fce16cec9b5b",
            measurementId: "G-BVXK2MD439"
        };

        if (firebase.apps.length === 0) {
            firebase.initializeApp(firebaseConfig);
            if ("measurementId" in firebaseConfig) {
                firebase.analytics();
            }
        }

        const LOADING_STEPS = [
            "جاري تهيئة المعبر الآمن وتجاوز التقييد الجغرافي...",
            "تحليل المسافات البينية ونسب التناظر المتقدمة...",
            "قراءة هندسة العينين وعمق النظرة السلوكية...",
            "تحليل الانطباع الفراسي والحركي للملامح...",
            "قياس زوايا خط الفك والنسبة الذهبية للوجه...",
            "صياغة التقرير الموسع والمفصل بوضوح عالي..."
        ];

        const maskData = (plainText) => {
            if (!plainText) return '';
            return CryptoJS.AES.encrypt(plainText, SECRET_SYSTEM_SALT).toString();
        };

        const unmaskData = (cipherText) => {
            if (!cipherText) return '';
            try {
                const bytes = CryptoJS.AES.decrypt(cipherText, SECRET_SYSTEM_SALT);
                return bytes.toString(CryptoJS.enc.Utf8);
            } catch (e) {
                return '';
            }
        };

        function SimaApplication() {
            const [darkMode, setDarkMode] = React.useState(false);
            const [userRole, setUserRole] = React.useState(() => localStorage.getItem('sima_pwa_role') || null);
            const [currentUserName, setCurrentUserName] = React.useState(() => localStorage.getItem('sima_pwa_name') || '');
            const [currentView, setCurrentView] = React.useState('landing'); 
            
            const [deferredPrompt, setDeferredPrompt] = React.useState(null);
            const [showInstallBtn, setShowInstallBtn] = React.useState(false);

            const [adminPasswordInput, setAdminPasswordInput] = React.useState('');
            const [memberNameInput, setMemberNameInput] = React.useState('');
            const [memberPasswordInput, setMemberPasswordInput] = React.useState('');
            
            const [regNameInput, setRegNameInput] = React.useState('');
            const [regPasswordInput, setRegPasswordInput] = React.useState('');

            const [usersList, setUsersList] = React.useState(() => {
                const localData = localStorage.getItem('sima_masked_users');
                return localData ? JSON.parse(localData) : [
                    { name: "تجربة عمار", password: "123", status: "active" }
                ];
            });

            const [keyType, setKeyType] = React.useState(() => localStorage.getItem('sima_key_type') || 'google-ai');
            const [maskedApiKey, setMaskedApiKey] = React.useState(() => localStorage.getItem('sima_api_hidden_mask') || '');

            const [image, setImage] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [loadingStep, setLoadingStep] = React.useState(0);
            const [result, setResult] = React.useState(null);
            const [showAdminPanel, setShowAdminPanel] = React.useState(false);

            React.useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);

            React.useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setShowInstallBtn(true);
                });
            }, []);

            React.useEffect(() => {
                let interval;
                if (loading) {
                    interval = setInterval(() => {
                        setLoadingStep((prev) => (prev + 1) % LOADING_STEPS.length);
                    }, 2200);
                } else {
                    setLoadingStep(0);
                }
                return () => clearInterval(interval);
            }, [loading]);

            const handleInstallApp = async () => {
                if (!deferredPrompt) {
                    alert('للتثبيت على هواتف آيفون: اضغط على زر "مشاركة" ثم اختر "إضافة إلى الشاشة الرئيسية".');
                    return;
                }
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') setShowInstallBtn(false);
                setDeferredPrompt(null);
            };

            const saveUsersToDB = (updatedList) => {
                setUsersList(updatedList);
                localStorage.setItem('sima_masked_users', JSON.stringify(updatedList));
            };

            const handleAdminLogin = () => {
                if (adminPasswordInput === 'salem1959') {
                    setUserRole('admin');
                    setCurrentUserName('المدير العام');
                    localStorage.setItem('sima_pwa_role', 'admin');
                    localStorage.setItem('sima_pwa_name', 'المدير العام');
                    setCurrentView('landing');
                    setAdminPasswordInput('');
                    setShowAdminPanel(true);
                } else {
                    alert('رمز مرور الإدارة العام غير صحيح!');
                }
            };

            const handleMemberLogin = () => {
                const foundUser = usersList.find(u => u.name.trim() === memberNameInput.trim() && u.password === memberPasswordInput);
                if (foundUser) {
                    if (foundUser.status === 'pending') {
                        alert('حسابك معلق بانتظار موافقة المدير العام أولاً.');
                        return;
                    }
                    setUserRole('member');
                    setCurrentUserName(foundUser.name);
                    localStorage.setItem('sima_pwa_role', 'member');
                    localStorage.setItem('sima_pwa_name', foundUser.name);
                    setCurrentView('landing');
                    setMemberNameInput('');
                    setMemberPasswordInput('');
                } else {
                    alert('بيانات الدخول غير مطابقة.');
                }
            };

            const handleRegister = () => {
                if (!regNameInput.trim() || !regPasswordInput) {
                    alert('يرجى ملء الاسم وكلمة السر الكاملة.');
                    return;
                }
                if (usersList.some(u => u.name.trim() === regNameInput.trim())) {
                    alert('هذا الاسم تم تسجيله مسبقاً.');
                    return;
                }
                const updated = [...usersList, { name: regNameInput.trim(), password: regPasswordInput, status: 'pending' }];
                saveUsersToDB(updated);
                alert('تم تقديم طلب التسجيل بنجاح! وبانتظار تفعيل الإدارة.');
                setCurrentView('landing');
                setRegNameInput('');
                setRegPasswordInput('');
            };

            const toggleUserStatus = (name) => {
                const updated = usersList.map(u => u.name === name ? { ...u, status: u.status === 'active' ? 'pending' : 'active' } : u);
                saveUsersToDB(updated);
            };

            const deleteUser = (name) => {
                if(confirm(`حذف نهائي للحساب: ${name}؟`)) {
                    saveUsersToDB(usersList.filter(u => u.name !== name));
                }
            };

            const handleLogout = () => {
                setUserRole(null);
                setCurrentUserName('');
                localStorage.removeItem('sima_pwa_role');
                localStorage.removeItem('sima_pwa_name');
                setCurrentView('landing');
                setShowAdminPanel(false);
            };

            const handleSaveMaskedKey = (rawKey) => {
                const cipher = maskData(rawKey);
                setMaskedApiKey(cipher);
                localStorage.setItem('sima_api_hidden_mask', cipher);
                localStorage.setItem('sima_key_type', keyType);
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => { setImage(reader.result); setResult(null); };
                    reader.readAsDataURL(file);
                }
            };

            const executeGeminiAnalysis = async () => {
                if (!image) return;
                const realKey = unmaskData(maskedApiKey);
                if (!realKey) {
                    alert('تنبيه النظام: لم يقم المسؤول بإعداد مفتاح الخادم المشفر بعد.');
                    return;
                }

                setLoading(true);
                try {
                    const base64Data = image.split(',')[1];
                    const mimeType = image.split(',')[0].match(/:(.*?);/)[1];

                    const prompt = `
                        قم بتحليل ملامح الوجه في هذه الصورة تحليلاً تفصيلياً وموسعاً جداً. ركز على التفاصيل الدقيقة لكل عنصر بناءً على الفراسة والنسب الجمالية والبنيوية.
                        أعد الناتج بصيغة JSON فقط باللغة العربية، وبنصوص غنية ومفصلة لكل محور:
                        {
                          "score": 88,
                          "summary": "تقرير شامل ومفصل يجمع النظرة البنيوية والسلوكية العامة للوجه بشكل مكثف وعميق.",
                          "eyes": "تحليل دقيق وموسع جداً لشكل العينين، النظرة، المسافة بينهما، وما تعكسه من ذكاء، انتباه، أو عمق سلوكي وعاطفي.",
                          "nose": "تحليل كامل لهندسة الأنف وحجمه وتناسقه البنيوي مع خطوط الوجه الوسطى وما يدل عليه من سمات القيادة أو الثقة.",
                          "lips": "تحليل موسع للشفاه والابتسامة، التناظر بين الشفة العليا والسفلى، ودلالات التعبير الانفعالي والقدرة على التواصل السلس.",
                          "jaw": "وصف دقيق للجبهة، خط الفك، الذقن، زوايا الوجه، التناظر الجانبي، ومدى مطابقتها للنسب الذهبية الجمالية.",
                          "energy": "تقييم كامل لمستوى الحضور، الكاريزما المكتشفة، الحيوية الظاهرة على البشرة، والطاقة النفسية المنعكسة من ملامح الصورة.",
                          "tips": "مجموعة من التوصيات والنصائح العميقة والمخصصة (نصائح جمالية، إطلالة، تعبيرات وجهية، أو نصائح سلوكية تدعم الحضور)."
                        }
                    `;

                    // بناء الرابط المباشر
                    let targetUrl = keyType === 'google-ai' 
                        ? `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${realKey}`
                        : `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${realKey}`;
                    
                    // معالج البروكسي العكسي المحدث لتفادي الـ Double Encoding ورفض الهيدرز
                    let bypassEndpoint = `https://corsproxy.io/?` + targetUrl;

                    const response = await fetch(bypassEndpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: mimeType, data: base64Data } }] }]
                        })
                    });

                    // التأكد من استجابة الخادم بنجاح قبل القراءة لتفادي الشاشة البيضاء
                    if (!response.ok) {
                        throw new Error(`استجابة الخادم الخارجي غير مستقرة (رمز الخطأ: ${response.status})`);
                    }

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const rawText = data.candidates[0].content.parts[0].text.trim();
                    
                    // جدار حماية آمن لاستخراج وتحليل الـ JSON لمنع انهيار الـ React تماماً
                    try {
                        const cleanJsonStr = rawText.replace(/^```json\s*/i, '').replace(/```$/, '').trim();
                        setResult(JSON.parse(cleanJsonStr));
                    } catch (jsonErr) {
                        throw new Error("استجاب الخادم بنص غير متوافق مع نظام الفهرسة الجمالية.");
                    }

                } catch (error) {
                    alert(`فشل التحليل الآمن: ${error.message || 'يرجى التحقق من صلاحية مفتاح الـ API.'}`);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="relative overflow-x-hidden min-h-screen flex flex-col justify-between">
                    
                    {/* الهيدر الفاخر */}
                    <header className="relative z-10 border-b-2 border-slate-200 dark:border-slate-800 backdrop-blur-lg bg-white/90 dark:bg-slate-950/90 sticky top-0 px-4 py-4">
                        <div className="max-w-5xl mx-auto flex flex-col sm:flex-row gap-4 justify-between items-center">
                            
                            <div className="flex items-center gap-3 text-center sm:text-right">
                                <div className="w-14 h-14 bg-gradient-to-br from-amber-500 to-yellow-600 rounded-2xl flex items-center justify-center shadow-xl text-white border-2 border-amber-400/30">
                                    <ScanFace className="w-8 h-8 " />
                                </div>
                                <div className="flex flex-col">
                                    <h1 className="font-kufi font-black text-4xl tracking-wide gold-gradient-text leading-none py-1">سِيما</h1>
                                    <p className="text-xs md:text-sm text-slate-500 dark:text-slate-400 font-extrabold mt-1">
                                        المنصة الرقمية الآمنة لفك شفرات ملامح الوجه والتحليل البنيوي والسلوكي الموسع
                                    </p>
                                </div>
                            </div>

                            <div className="flex items-center gap-2">
                                {showInstallBtn && (
                                    <button onClick={handleInstallApp} className="px-4 py-2 rounded-xl bg-emerald-600 text-white text-xs font-black flex items-center gap-1.5 shadow-md animate-bounce">
                                        <PlusCircle className="w-4 h-4" /> تثبيت المنصة
                                    </button>
                                )}
                                {userRole === 'admin' && (
                                    <button onClick={() => setShowAdminPanel(!showAdminPanel)} className="p-2.5 rounded-xl bg-purple-500/10 text-purple-700 dark:text-purple-400 border-2 border-purple-500/30 text-xs font-black flex items-center gap-1">
                                        <Settings className="w-4 h-4" /> لوحة الإدارة
                                    </button>
                                )}
                                {userRole && (
                                    <button onClick={handleLogout} className="p-2.5 rounded-xl bg-red-500/10 text-red-700 dark:text-red-400 border-2 border-red-500/30 text-xs font-black flex items-center gap-1">
                                        <LogOut className="w-4 h-4" /> خروج ({currentUserName})
                                    </button>
                                )}
                                <button onClick={() => setDarkMode(!darkMode)} className="p-2.5 rounded-xl bg-slate-200 dark:bg-slate-900 text-slate-800 dark:text-slate-200 border border-slate-300 dark:border-slate-800">
                                    {darkMode ? <Sun className="w-5 h-5" /> : <Moon className="w-5 h-5" />}
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* المحتوى الرئيسي للمنصة */}
                    <main className="relative z-10 max-w-4xl mx-auto px-4 py-8 flex-grow w-full flex flex-col items-center justify-center">
                        
                        {/* البوابة الثلاثية المحمية */}
                        {!userRole && currentView === 'landing' && (
                            <section className="w-full max-w-md bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-3xl p-6 shadow-xl text-center space-y-6">
                                <div className="space-y-2">
                                    <div className="inline-block p-3 bg-amber-500/10 rounded-full mb-1">
                                        <Sparkles className="w-8 h-8 text-amber-500" />
                                    </div>
                                    <h2 className="text-2xl font-black text-slate-900 dark:text-white">بوابة سِيما المشتركة والآمنة</h2>
                                    <p className="text-xs text-slate-500 dark:text-slate-400 font-extrabold">نظام تعمية متقدم لتشفير البيانات وحماية خصوصية الخادم بالكامل</p>
                                </div>
                                <div className="grid grid-cols-1 gap-4">
                                    <button onClick={() => setCurrentView('login_member')} className="p-4 rounded-2xl border-2 border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-right font-black text-sm flex items-center justify-between hover:border-amber-500 dark:hover:border-amber-500 transition-all shadow-sm">
                                        <span className="flex items-center gap-2.5"><User className="w-5 h-5 text-purple-500" /> دخول الأعضاء والمستخدمين المعتمدين</span>
                                        <span className="text-sm text-slate-400">←</span>
                                    </button>
                                    <button onClick={() => setCurrentView('login_admin')} className="p-4 rounded-2xl border-2 border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-right font-black text-sm flex items-center justify-between hover:border-amber-500 dark:hover:border-amber-500 transition-all shadow-sm">
                                        <span className="flex items-center gap-2.5"><Lock className="w-5 h-5 text-amber-500" /> لوحة التحكم الخاصة بالمدير العام</span>
                                        <span className="text-sm text-slate-400">←</span>
                                    </button>
                                    <button onClick={() => setCurrentView('register')} className="p-4 rounded-2xl border-2 border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-right font-black text-sm flex items-center justify-between hover:border-amber-500 dark:hover:border-amber-500 transition-all shadow-sm">
                                        <span className="flex items-center gap-2.5"><UserPlus className="w-5 h-5 text-emerald-500" /> طلب إنشاء حساب عضوية جديد</span>
                                        <span className="text-sm text-slate-400">←</span>
                                    </button>
                                </div>
                            </section>
                        )}

                        {/* النماذج الثلاثية لعمليات الدخول */}
                        {!userRole && currentView === 'login_admin' && (
                            <div className="w-full max-w-sm bg-white dark:bg-slate-900 p-6 rounded-3xl border-2 border-slate-200 dark:border-slate-800 shadow-md space-y-4">
                                <h3 className="font-black text-lg text-amber-500 flex items-center gap-2"><Lock className="w-5 h-5" /> دخول الإدارة العام</h3>
                                <input 
                                    type="password" placeholder="أدخل كلمة مرور المدير..." value={adminPasswordInput}
                                    onChange={(e) => setAdminPasswordInput(e.target.value)}
                                    className="w-full px-4 py-3 text-sm font-bold bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none"
                                />
                                <div className="flex gap-2">
                                    <button onClick={handleAdminLogin} className="w-full py-3 bg-amber-600 hover:bg-amber-700 text-white font-black rounded-xl text-sm">تأكيد الدخول</button>
                                    <button onClick={() => setCurrentView('landing')} className="w-full py-3 bg-slate-100 dark:bg-slate-950 text-slate-600 dark:text-slate-400 font-black rounded-xl text-sm">إلغاء</button>
                                </div>
                            </div>
                        )}

                        {!userRole && currentView === 'login_member' && (
                            <div className="w-full max-w-sm bg-white dark:bg-slate-900 p-6 rounded-3xl border-2 border-slate-200 dark:border-slate-800 shadow-md space-y-4">
                                <h3 className="font-black text-lg text-purple-600 flex items-center gap-2"><User className="w-5 h-5" /> بوابة الأعضاء</h3>
                                <div className="space-y-3">
                                    <input 
                                        type="text" placeholder="الاسم الكامل المسجل..." value={memberNameInput}
                                        onChange={(e) => setMemberNameInput(e.target.value)}
                                        className="w-full px-4 py-3 text-sm font-bold bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none"
                                    />
                                    <input 
                                        type="password" placeholder="كلمة السر..." value={memberPasswordInput}
                                        onChange={(e) => setMemberPasswordInput(e.target.value)}
                                        className="w-full px-4 py-3 text-sm font-bold bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none"
                                    />
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={handleMemberLogin} className="w-full py-3 bg-amber-600 text-white font-black rounded-xl text-sm">دخول</button>
                                    <button onClick={() => setCurrentView('landing')} className="w-full py-3 bg-slate-100 dark:bg-slate-950 text-slate-600 dark:text-slate-400 font-black rounded-xl text-sm">رجوع</button>
                                </div>
                            </div>
                        )}

                        {!userRole && currentView === 'register' && (
                            <div className="w-full max-w-sm bg-white dark:bg-slate-900 p-6 rounded-3xl border-2 border-slate-200 dark:border-slate-800 shadow-md space-y-4">
                                <h3 className="font-black text-lg text-emerald-500 flex items-center gap-2"><UserPlus className="w-5 h-5" /> طلب عضوية محمية جديدة</h3>
                                <div className="space-y-3">
                                    <input 
                                        type="text" placeholder="الاسم الكامل المطلوب..." value={regNameInput}
                                        onChange={(e) => setRegNameInput(e.target.value)}
                                        className="w-full px-4 py-3 text-sm font-bold bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none"
                                    />
                                    <input 
                                        type="password" placeholder="اختر كلمة السر الخاصة بك..." value={regPasswordInput}
                                        onChange={(e) => setRegPasswordInput(e.target.value)}
                                        className="w-full px-4 py-3 text-sm font-bold bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none"
                                    />
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={handleRegister} className="w-full py-3 bg-emerald-600 text-white font-black rounded-xl text-sm">إرسال الطلب الآمن</button>
                                    <button onClick={() => setCurrentView('landing')} className="w-full py-3 bg-slate-100 dark:bg-slate-950 text-slate-600 dark:text-slate-400 font-black rounded-xl text-sm">رجوع</button>
                                </div>
                            </div>
                        )}

                        {/* لوحة تحكم الإدارة والمفتاح المعمّى */}
                        {userRole === 'admin' && showAdminPanel && (
                            <section className="w-full bg-white dark:bg-slate-900 border-2 border-amber-500 rounded-3xl p-5 mb-6 shadow-md space-y-5 text-right">
                                <div className="border-b-2 border-slate-100 dark:border-slate-800 pb-3 flex justify-between items-center">
                                    <h3 className="font-black text-base text-amber-600 flex items-center gap-2"><Settings className="w-5 h-5" /> غرف التحكم والتشفير التام</h3>
                                    <span className="text-xs px-2.5 py-1 bg-emerald-500/10 text-emerald-600 font-black rounded-md flex items-center gap-1"><ShieldAlert className="w-4 h-4" /> نظام الفك الجغرافي نشط</span>
                                </div>
                                
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-slate-50 dark:bg-slate-950 p-4 rounded-2xl border-2 border-slate-200 dark:border-slate-800">
                                    <div>
                                        <span className="block text-xs font-black text-slate-500 dark:text-slate-400 mb-1.5">محرك الربط والاتصال الأساسي:</span>
                                        <select value={keyType} onChange={(e) => { setKeyType(e.target.value); localStorage.setItem('sima_key_type', e.target.value); }} className="w-full px-3 py-2.5 text-xs font-bold bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-xl">
                                            <option value="google-ai">مفتاح استوديو الذكاء الاصطناعي (AIza)</option>
                                            <option value="google-cloud">مفاتيح السحابة والمحركات المحدثة الأحدث v1</option>
                                        </select>
                                    </div>
                                    <div>
                                        <span className="block text-xs font-black text-slate-500 dark:text-slate-400 mb-1.5">مفتاح الـ API الخارجي (يُعمّى ويُحفظ مشفراً فوراً):</span>
                                        <input 
                                            type="password" placeholder="ضع المفتاح هنا لتشغيله وتعميته بشكل غير مرئي..." 
                                            onChange={(e) => handleSaveMaskedKey(e.target.value)}
                                            className="w-full px-4 py-2.5 text-xs bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-xl text-left font-mono focus:outline-none"
                                        />
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <span className="block text-sm font-black text-slate-500 dark:text-slate-400">إدارة صلاحيات وتراخيص المستخدمين المشتركين:</span>
                                    <div className="overflow-x-auto border-2 border-slate-200 dark:border-slate-800 rounded-2xl">
                                        <table className="w-full text-right border-collapse text-xs font-bold">
                                            <thead>
                                                <tr className="bg-slate-100 dark:bg-slate-950 text-slate-500 font-black border-b-2 border-slate-200 dark:border-slate-800">
                                                    <th className="p-3.5">اسم المستخدم</th>
                                                    <th className="p-3.5">رمز المرور</th>
                                                    <th className="p-3.5">حالة التفعيل الحالية</th>
                                                    <th className="p-3.5 text-center">تغيير الصلاحية</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {usersList.map((user, idx) => (
                                                    <tr key={idx} className="border-b border-slate-200 dark:border-slate-800 last:border-0 hover:bg-slate-50 dark:hover:bg-slate-900/50">
                                                        <td className="p-3.5 font-black text-sm">{user.name}</td>
                                                        <td className="p-3.5 font-mono text-slate-400 text-sm">{user.password}</td>
                                                        <td className="p-3.5">
                                                            <span className={`px-2.5 py-1 rounded-md font-black text-xs ${user.status === 'active' ? 'bg-emerald-500/10 text-emerald-600' : 'bg-amber-500/10 text-amber-600'}`}>
                                                                {user.status === 'active' ? '✔ مفعّل ونشط' : '⏳ معلّق ومخفي'}
                                                            </span>
                                                        </td>
                                                        <td className="p-3.5 flex items-center justify-center gap-2">
                                                            <button onClick={() => toggleUserStatus(user.name)} className={`px-3 py-1.5 rounded-lg border-2 font-black text-xs ${user.status === 'active' ? 'bg-amber-500/10 text-amber-600 border-amber-500/30' : 'bg-emerald-500/10 text-emerald-600 border-emerald-500/30'}`}>
                                                                {user.status === 'active' ? 'حظر وتعليق' : 'تفعيل الحساب'}
                                                            </button>
                                                            <button onClick={() => deleteUser(user.name)} className="px-3 py-1.5 bg-red-500/10 text-red-600 border-2 border-red-500/20 rounded-lg text-xs font-black">حذف</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </section>
                        )}

                        {/* لوحة الفحص والتحليل الموسع */}
                        {userRole && (
                            <div className="w-full space-y-6">
                                <section className="text-center mb-2">
                                    <p className="text-sm font-black text-slate-600 dark:text-slate-400">
                                        الحساب النشط حالياً: <span className="text-amber-500 font-black bg-amber-500/10 px-2 py-0.5 rounded-md">{currentUserName}</span>. جدار الحماية ضد الانهيار مفعّل.
                                    </p>
                                </section>

                                <section className="bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-3xl p-6 shadow-md">
                                    {!image ? (
                                        <div className="border-4 border-dashed rounded-2xl p-10 text-center cursor-pointer border-slate-300 dark:border-slate-700 hover:border-amber-500 dark:hover:border-amber-500 bg-slate-50/50 dark:bg-slate-950/20 relative">
                                            <input type="file" accept="image/*" onChange={handleFileChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                            <div className="w-14 h-14 mx-auto mb-4 bg-amber-500/10 text-amber-600 rounded-full flex items-center justify-center"><Upload className="w-6 h-6" /></div>
                                            <h3 className="text-base font-black mb-1">اضغط هنا أو ارفع صورة الوجه مباشرة لبدء فك الشفرات</h3>
                                            <p className="text-xs text-slate-400 font-bold">يدعم جميع صيغ الصور ومحمي بالكامل ضد التسريب</p>
                                        </div>
                                    ) : (
                                        <div className="relative rounded-2xl overflow-hidden bg-slate-100 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800">
                                            <img src={image} alt="Face Preview" className="max-h-[350px] w-full object-contain mx-auto" />
                                            <div className="absolute bottom-4 right-4 left-4 flex justify-between items-center gap-2">
                                                <button onClick={() => { setImage(null); setResult(null); }} className="px-4 py-2.5 bg-red-600 text-white rounded-xl shadow-md font-black text-xs flex items-center gap-1.5"><Trash2 className="w-4 h-4" /> إلغاء الصورة</button>
                                                {!result && !loading && <button onClick={executeGeminiAnalysis} className="px-6 py-3 bg-amber-600 hover:bg-amber-700 text-white rounded-xl shadow-lg font-black flex items-center gap-2 text-xs transition-colors"><Sparkles className="w-5 h-5" /> تشغيل التحليل الموسع الشامل</button>}
                                            </div>
                                        </div>
                                    )}
                                </section>

                                {loading && (
                                    <section className="bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-3xl p-6 shadow-md text-center">
                                        <RefreshCw className="w-10 h-10 text-amber-500 animate-spin mx-auto mb-3" />
                                        <h3 className="text-base font-black mb-1">معالجة وهندسة المؤشرات الحيوية جارية الآن</h3>
                                        <p className="text-amber-600 dark:text-amber-400 font-black text-sm">{LOADING_STEPS[loadingStep]}</p>
                                    </section>
                                )}

                                {/* عرض النتائج التفصيلية والموسعة بخط سميك وواضح جداً */}
                                {result && !loading && (
                                    <div className="space-y-5">
                                        
                                        {/* التقرير العام والدرجة */}
                                        <div className="bg-white dark:bg-slate-900 border-2 border-amber-500/40 rounded-3xl p-6 shadow-md text-right space-y-3">
                                            <div className="flex justify-between items-center border-b-2 border-slate-100 dark:border-slate-800 pb-3">
                                                <h3 className="text-xl font-black text-slate-900 dark:text-white flex items-center gap-2">
                                                    <Award className="w-6 h-6 text-amber-500" /> التقرير البنيوي العام والملخص التنفيذي
                                                </h3>
                                                <div className="text-sm font-black bg-amber-500/10 text-amber-600 dark:text-amber-400 px-3 py-1 rounded-xl border border-amber-500/20">
                                                    معدل التناظر الجمالي: {result.score}/100
                                                </div>
                                            </div>
                                            <p className="text-sm md:text-base text-slate-800 dark:text-slate-100 font-bold leading-relaxed">
                                                {result.summary}
                                            </p>
                                        </div>

                                        {/* شبكة التحليل المكونة من 6 محاور تفصيلية */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-right">
                                            
                                            {/* 1. العيون والنظرة */}
                                            <div className="bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm space-y-2">
                                                <h4 className="font-black text-sm text-purple-600 dark:text-purple-400 flex items-center gap-1.5 border-b border-slate-100 dark:border-slate-800 pb-1.5">
                                                    <Eye className="w-4 h-4" /> 1. هندسة العينين والعمق السلوكي
                                                </h4>
                                                <p className="text-xs md:text-sm text-slate-700 dark:text-slate-200 font-bold leading-relaxed">{result.eyes}</p>
                                            </div>

                                            {/* 2. الأنف والتناسب */}
                                            <div className="bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm space-y-2">
                                                <h4 className="font-black text-sm text-amber-600 dark:text-amber-400 flex items-center gap-1.5 border-b border-slate-100 dark:border-slate-800 pb-1.5">
                                                    <Compass className="w-4 h-4" /> 2. الأنف والتناظر البنيوي الأوسط
                                                </h4>
                                                <p className="text-xs md:text-sm text-slate-700 dark:text-slate-200 font-bold leading-relaxed">{result.nose}</p>
                                            </div>

                                            {/* 3. الشفاه والتواصل */}
                                            <div className="bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm space-y-2">
                                                <h4 className="font-black text-sm text-emerald-600 dark:text-emerald-400 flex items-center gap-1.5 border-b border-slate-100 dark:border-slate-800 pb-1.5">
                                                    <Smile className="w-4 h-4" /> 3. الشفاه، الابتسامة ونمط التعبير والانفعال
                                                </h4>
                                                <p className="text-xs md:text-sm text-slate-700 dark:text-slate-200 font-bold leading-relaxed">{result.lips}</p>
                                            </div>

                                            {/* 4. الفك والنسب الذهبية */}
                                            <div className="bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm space-y-2">
                                                <h4 className="font-black text-sm text-blue-600 dark:text-blue-400 flex items-center gap-1.5 border-b border-slate-100 dark:border-slate-800 pb-1.5">
                                                    <ScanFace className="w-4 h-4" /> 4. محيط الفك، الجبهة والنسبة الذهبية الوجهية
                                                </h4>
                                                <p className="text-xs md:text-sm text-slate-700 dark:text-slate-200 font-bold leading-relaxed">{result.jaw}</p>
                                            </div>

                                            {/* 5. الحضور والطاقة المكتشفة */}
                                            <div className="bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm space-y-2">
                                                <h4 className="font-black text-sm text-red-600 dark:text-red-400 flex items-center gap-1.5 border-b border-slate-100 dark:border-slate-800 pb-1.5">
                                                    <Heart className="w-4 h-4" /> 5. الكاريزما، الحيوية والطاقة النفسية المنعكسة
                                                </h4>
                                                <p className="text-xs md:text-sm text-slate-700 dark:text-slate-200 font-bold leading-relaxed">{result.energy}</p>
                                            </div>

                                            {/* 6. التوصيات العميقة */}
                                            <div className="bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm space-y-2">
                                                <h4 className="font-black text-sm text-orange-600 dark:text-orange-400 flex items-center gap-1.5 border-b border-slate-100 dark:border-slate-800 pb-1.5">
                                                    <Star className="w-4 h-4" /> 6. التوصيات التطويرية والجمالية المخصصة
                                                </h4>
                                                <p className="text-xs md:text-sm text-slate-700 dark:text-slate-200 font-bold leading-relaxed">{result.tips}</p>
                                            </div>

                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                    </main>

                    {/* الفوتر الاحترافي */}
                    <footer className="w-full bg-slate-950 text-slate-400 border-t border-slate-900 text-center py-6 px-4 space-y-2 mt-12">
                        <div className="text-sm font-black text-slate-300">
                            تم التصميم والتطوير بواسطة <span className="text-white font-black tracking-wide">الدكتور زكريا محمد عطوني</span> © 2026
                        </div>
                    </footer>

                </div>
            );
        }

        const container = document.getElementById('sima-app-root');
        const root = ReactDOM.createRoot(container);
        root.render(<SimaApplication />);
    </script>
</body>
</html>
