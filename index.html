        const SECRET_SYSTEM_SALT = "Sima_Secure_Mask_System_2026_Dr_Attouni";
        
        const firebaseConfig = {

            authDomain: "sima-4378c.firebaseapp.com",

            storageBucket: "sima-4378c.firebasestorage.app",
            messagingSenderId: "978988425410",

            measurementId: "G-BVXK2MD439"

        if (firebase.apps.length === 0) {
            try {
                firebase.initializeApp(firebaseConfig);

                    try { firebase.analytics(); } catch (e) { console.warn("Analytics safely bypassed."); }

                console.error("Firebase insulated mode activated.");
            }

        const LOADING_STEPS = [
            "توجيه الطلب الصريح والمباشر عبر الـ VPN المستقر...",
            "تحليل الملامح الهندسية ونسب التناظر البنيوية...",
            "قراءة هندسة العينين وعمق النظرة التعبيرية...",
            "تحليل الانطباع الفراسي والحركي للقسمات...",
            "قياس زوايا خط الفك والنسبة الذهبية للوجه...",
            "صياغة التقرير الموسع والمفصل بوضوح عالي..."
        ];

        const maskData = (plainText) => {
            if (!plainText) return '';
            return CryptoJS.AES.encrypt(plainText, SECRET_SYSTEM_SALT).toString();
        };

        const unmaskData = (cipherText) => {
            if (!cipherText) return '';
            try {
                const bytes = CryptoJS.AES.decrypt(cipherText, SECRET_SYSTEM_SALT);
                return bytes.toString(CryptoJS.enc.Utf8);
            } catch (e) { return ''; }
        };

        function SimaApplication() {
            const [darkMode, setDarkMode] = React.useState(false);
            const [userRole, setUserRole] = React.useState(() => localStorage.getItem('sima_pwa_role') || null);
            const [currentUserName, setCurrentUserName] = React.useState(() => localStorage.getItem('sima_pwa_name') || '');
            const [currentView, setCurrentView] = React.useState('landing'); 
            
            const [deferredPrompt, setDeferredPrompt] = React.useState(null);
            const [showInstallBtn, setShowInstallBtn] = React.useState(false);
            const [adminPasswordInput, setAdminPasswordInput] = React.useState('');
            const [memberNameInput, setMemberNameInput] = React.useState('');
            const [memberPasswordInput, setMemberPasswordInput] = React.useState('');
            
            const [regNameInput, setRegNameInput] = React.useState('');
            const [regPasswordInput, setRegPasswordInput] = React.useState('');
            const [copySuccess, setCopySuccess] = React.useState(false);
            
            const [dailyLimit, setDailyLimit] = React.useState(() => {
                return parseInt(localStorage.getItem('sima_daily_limit')) || 3;
            });
            const [usersList, setUsersList] = React.useState(() => {
                const localData = localStorage.getItem('sima_masked_users');
                return localData ? JSON.parse(localData) : [
                    { name: "تجربة عمار", password: "123", status: "active", usedQuota: {}, lastResetDate: "" }
                ];
            });
            
            const [keyType, setKeyType] = React.useState(() => localStorage.getItem('sima_key_type') || 'google-ai');
            const [maskedApiKey, setMaskedApiKey] = React.useState(() => localStorage.getItem('sima_api_hidden_mask') || '');
            const [image, setImage] = React.useState(null);
            const [compressedBase64, setCompressedBase64] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [loadingStep, setLoadingStep] = React.useState(0);
            const [result, setResult] = React.useState(null);
            const [showAdminPanel, setShowAdminPanel] = React.useState(false);

            React.useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            React.useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setShowInstallBtn(true);
                });
            }, []);

            React.useEffect(() => {
                let interval;
                if (loading) {
                    interval = setInterval(() => {
                        setLoadingStep((prev) => (prev + 1) % LOADING_STEPS.length);
                    }, 2200);
                } else { setLoadingStep(0); }
                return () => clearInterval(interval);
            }, [loading]);

            const handleInstallApp = async () => {
                if (!deferredPrompt) {
                    alert('للتثبيت على هواتف آيفون: اضغط على زر "مشاركة" ثم اختر "إضافة إلى الشاشة الرئيسية".');
                    return;
                }
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') setShowInstallBtn(false);
                setDeferredPrompt(null);
            };

            const saveUsersToDB = (updatedList) => {
                setUsersList(updatedList);
                localStorage.setItem('sima_masked_users', JSON.stringify(updatedList));
            };

            const handleAdminLogin = () => {
                if (adminPasswordInput === 'salem1959') {
                    setUserRole('admin');
                    setCurrentUserName('المدير العام');
                    localStorage.setItem('sima_pwa_role', 'admin');
                    localStorage.setItem('sima_pwa_name', 'المدير العام');
                    setCurrentView('landing');
                    setAdminPasswordInput('');
                    setShowAdminPanel(true);
                } else { alert('رمز مرور الإدارة العام غير صحيح!'); }
            };

            const handleMemberLogin = () => {
                const foundUser = usersList.find(u => u.name.trim() === memberNameInput.trim() && u.password === memberPasswordInput);
                if (foundUser) {
                    if (foundUser.status === 'pending') {
                        alert('حسابك معلق بانتظار موافقة المدير العام أولاً.');
                        return;
                    }
                    setUserRole('member');
                    setCurrentUserName(foundUser.name);
                    localStorage.setItem('sima_pwa_role', 'member');
                    localStorage.setItem('sima_pwa_name', foundUser.name);
                    setCurrentView('landing');
                    setMemberNameInput('');
                    setMemberPasswordInput('');
                } else { alert('بيانات الدخول غير مطابقة.'); }
            };

            const handleRegister = () => {
                if (!regNameInput.trim() || !regPasswordInput) {
                    alert('يرجى ملء الاسم وكلمة السر الكاملة.');
                    return;
                }
                if (usersList.some(u => u.name.trim() === regNameInput.trim())) {
                    alert('هذا الاسم تم تسجيله مسبقاً.');
                    return;
                }
                const updated = [...usersList, { name: regNameInput.trim(), password: regPasswordInput, status: 'pending', usedQuota: {}, lastResetDate: "" }];
                saveUsersToDB(updated);
                alert('تم تقديم طلب التسجيل بنجاح! وبانتظار تفعيل الإدارة.');
                setCurrentView('landing');
                setRegNameInput('');
                setRegPasswordInput('');
            };

            const toggleUserStatus = (name) => {
                const updated = usersList.map(u => u.name === name ? { ...u, status: u.status === 'active' ? 'pending' : 'active' } : u);
                saveUsersToDB(updated);
            };

            const deleteUser = (name) => {
                if(confirm(`حذف نهائي للحساب: ${name}؟`)) {
                    saveUsersToDB(usersList.filter(u => u.name !== name));
                }
            };

            const handleLogout = () => {
                setUserRole(null);
                setCurrentUserName('');
                localStorage.removeItem('sima_pwa_role');
                localStorage.removeItem('sima_pwa_name');
                setCurrentView('landing');
                setShowAdminPanel(false);
            };

            const handleSaveMaskedKey = (rawKey) => {
                const cipher = maskData(rawKey);
                setMaskedApiKey(cipher);
                localStorage.setItem('sima_api_hidden_mask', cipher);
                localStorage.setItem('sima_key_type', keyType);
            };

            const handleSaveDailyLimit = (val) => {
                const num = parseInt(val) || 1;
                setDailyLimit(num);
                localStorage.setItem('sima_daily_limit', num);
            };

            const getUserRemainingQuota = (username) => {
                if (!username || userRole === 'admin') return { remaining: 999, limit: 999 };
                const today = new Date().toDateString();
                const user = usersList.find(u => u.name === username);
                if (!user) return { remaining: 0, limit: dailyLimit };
                
                if (user.lastResetDate !== today) {
                    return { remaining: dailyLimit, limit: dailyLimit };
                }
                const used = user.usedQuota?.[today] || 0;
                return { remaining: Math.max(0, dailyLimit - used), limit: dailyLimit };
            };

            const compressAndSetImage = (file) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const max_size = 380; 
                        if (width > height) {
                            if (width > max_size) { height *= max_size / width; width = max_size; }
                        } else {
                            if (height > max_size) { width *= max_size / height; height = max_size; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.45); 
                        setImage(compressedDataUrl);
                        setCompressedBase64(compressedDataUrl.split(',')[1]);
                        setResult(null);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) compressAndSetImage(file);
            };

            const executeGeminiAnalysis = async () => {
                if (!compressedBase64) return;
                if (userRole !== 'admin') {
                    const { remaining } = getUserRemainingQuota(currentUserName);
                    if (remaining <= 0) {
                        alert('تنبيه: لقد استهلكت كامل حصتك اليومية المحددة لك من قبل الإدارة. يرجى العودة غداً.');
                        return;
                    }
                }
                const realKey = unmaskData(maskedApiKey);
                if (!realKey) {
                    alert('تنبيه: يرجى وضع مفتاح الخادم (API Key) في لوحة الإدارة أولاً.');
                    return;
                }
                setLoading(true);
                
                const prompt = `حلل الصورة تفصيلياً بالعربية. أعد الناتج JSON حتمياً بهذه البنية فقط:
                {"score":85,"summary":"ملخص موسع غني للشخصية","eyes":"تحليل العينين والنظرة","nose":"هندسة الأنف وحجمه","lips":"الشفاه والابتسامة ونمط التعبير","jaw":"خط الفك والنسبة الذهبية للوجه","energy":"تقييم الحضور والطاقة الحيوية","tips":"توصيات لدعم الحضور والجمال"}`;
                const targetUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${realKey}`;
                
                try {
                    const response = await fetch(targetUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: compressedBase64 } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData?.error?.message || "سيرفر غوغل يرفض المعالجة.");
                    }
                    const data = await response.json();
                    const rawText = data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
                    if (!rawText) throw new Error("استجابة فارغة من خوادم الذكاء الاصطناعي.");
                    
                    try {
                        const parsedData = JSON.parse(rawText);
                        setResult(parsedData);
                        
                        if (userRole !== 'admin') {

                                            </p>
                                            
                                            {/* قسم أزرار المشاركة المتقدمة والتفاعلية */}
                                            <div className="pt-4 border-t border-slate-100 dark:border-slate-800 flex flex-col sm:flex-row items-center justify-center gap-3">
                                                <button 
                                                    onClick={handleNativeShare}
                                                    className="w-full sm:w-auto px-6 py-3 bg-amber-600 hover:bg-amber-700 text-white font-black rounded-xl text-sm flex items-center justify-center gap-2 shadow-md transition-all duration-200 transform active:scale-95"
                                                >
                                                    <Icons.Share className="w-5 h-5" />
                                                    مشاركة التحليل مباشرة (تطبيقات / فيسبوك)
                                                </button>
                                                
                                                <button 
                                                    onClick={handleCopyToClipboard}
                                                    className={`w-full sm:w-auto px-6 py-3 font-black rounded-xl text-sm flex items-center justify-center gap-2 shadow-md transition-all duration-200 transform active:scale-95 border-2 ${copySuccess ? 'bg-emerald-600 text-white border-emerald-600' : 'bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-200 border-slate-200 dark:border-slate-700'}`}
                                                >
                                                    <Icons.Copy className="w-5 h-5" />
                                                    {copySuccess ? '✓ تم نسخ التقرير الكامل!' : 'نسخ النص المنسق لنشره يدوياً'}
                                                </button>
                                            </div>
                                        </div>
                                        
                                        {/* تفاصيل ملامح الوجه الستة الأساسية */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-right">
                                            <div className="bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm space-y-2">
                                                <h4 className="font-black text-sm text-purple-600 dark:text-purple-400 flex items-center gap-1.5 border-b border-slate-100 dark:border-slate-800 pb-1.5">
                                                    <Icons.Eye className="w-4 h-4" /> 1. هندسة العينين والعمق السلوكي
                                                </h4>
                                                <p className="text-xs md:text-sm text-slate-700 dark:text-slate-200 font-bold leading-relaxed">{result?.eyes}</p>
                                            </div>
                                            <div className="bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm space-y-2">
                                                <h4 className="font-black text-sm text-amber-600 dark:text-amber-400 flex items-center gap-1.5 border-b border-slate-100 dark:border-slate-800 pb-1.5">
                                                    <Icons.Compass className="w-4 h-4" /> 2. الأنف والتناظر البنيوي الأوسط
                                                </h4>
                                                <p className="text-xs md:text-sm text-slate-700 dark:text-slate-200 font-bold leading-relaxed">{result?.nose}</p>
                                            </div>
                                            <div className="bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm space-y-2">
                                                <h4 className="font-black text-sm text-emerald-600 dark:text-emerald-400 flex items-center gap-1.5 border-b border-slate-100 dark:border-slate-800 pb-1.5">
                                                    <Icons.Smile className="w-4 h-4" /> 3. الشفاه، الابتسامة ونمط التعبير والانفعال
                                                </h4>
                                                <p className="text-xs md:text-sm text-slate-700 dark:text-slate-200 font-bold leading-relaxed">{result?.lips}</p>
                                            </div>
                                            <div className="bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm space-y-2">
                                                <h4 className="font-black text-sm text-blue-600 dark:text-blue-400 flex items-center gap-1.5 border-b border-slate-100 dark:border-slate-800 pb-1.5">
                                                    <Icons.ScanFace className="w-4 h-4" /> 4. محيط الفك، الجبهة والنسبة الذهبية الوجهية
                                                </h4>
                                                <p className="text-xs md:text-sm text-slate-700 dark:text-slate-200 font-bold leading-relaxed">{result?.jaw}</p>
                                            </div>
                                            <div className="bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm space-y-2">
                                                <h4 className="font-black text-sm text-red-600 dark:text-red-400 flex items-center gap-1.5 border-b border-slate-100 dark:border-slate-800 pb-1.5">
                                                    <Icons.Heart className="w-4 h-4" /> 5. الكاريزما، الحيوية والطاقة النفسية المنعكسة
                                                </h4>
                                                <p className="text-xs md:text-sm text-slate-700 dark:text-slate-200 font-bold leading-relaxed">{result?.energy}</p>
                                            </div>
                                            <div className="bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm space-y-2">
                                                <h4 className="font-black text-sm text-orange-600 dark:text-orange-400 flex items-center gap-1.5 border-b border-slate-100 dark:border-slate-800 pb-1.5">
                                                    <Icons.Star className="w-4 h-4" /> 6. التوصيات التطويرية والجمالية المخصصة
                                                </h4>
                                                <p className="text-xs md:text-sm text-slate-700 dark:text-slate-200 font-bold leading-relaxed">{result?.tips}</p>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* الفوتر */}
                    <footer className="w-full bg-slate-950 text-slate-400 border-t border-slate-900 text-center py-6 px-4 space-y-2 mt-12">
                        <div className="text-sm font-black text-slate-300">
                            تم التصميم والتطوير بواسطة <span className="text-white font-black tracking-wide">الدكتور زكريا محمد عطوني</span> © 2026
                        </div>
                    </footer>
                </div>
            );
        }

        const container = document.getElementById('sima-app-root');
        const root = ReactDOM.createRoot(container);
        root.render(<SimaApplication />);
    </script>
</body>
</html>
