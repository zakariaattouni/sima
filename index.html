            if (!cipherText) return '';

            } catch (e) { return ''; }

            return new Promise((resolve, reject) => {
                if (!database) { reject(new Error("قاعدة البيانات غير متاحة")); return; }

                database.ref('app_settings/api_key').set({
                    maskedKey: encryptedKey,                    keyType: keyType,
                    lastUpdated: Date.now()
                }).then(() => { clearTimeout(timeout); resolve(true); })
                  .catch((err) => { clearTimeout(timeout); reject(err); });
            });
        };

        const loadKeyFromCloud = () => {
            return new Promise((resolve) => {
                if (!database) { resolve(null); return; }
                const timeout = setTimeout(() => resolve(null), 8000);
                database.ref('app_settings/api_key').once('value')

                        clearTimeout(timeout);
                        resolve(snapshot.exists() ? snapshot.val() : null);

                        let width = img.width;

                        if (width > height) {
                            if (width > max_size) { height *= max_size / width; width = max_size; }
                        } else {
                            if (height > max_size) { width *= max_size / height; height = max_size; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        setImage(compressedDataUrl);

                const targetUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${realKey}`;
                
                try {
                    const response = await fetch(targetUrl, {
                        method: 'POST',
