<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سِيما (Sima) - المنصة الذكية لفك شفرات ملامح الوجه</title>
    
    <!-- خط Cairo الفاخر من Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <!-- استدعاء المكتبات البرمجية الأساسية ومكتبات التشفير والـ Firebase عبر CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <!-- حزمة Firebase المحدثة المتكاملة للويب -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
        }
        .circle-bg { fill: none; stroke: #e2e8f0; }
        .dark .circle-bg { stroke: #1e293b; }
        .circle-progress { fill: none; stroke-linecap: round; transition: stroke-dashoffset 1.5s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300 min-h-screen">

    <div id="sima-app-root"></div>

    <script type="text/babel">
        const { 
            Sparkles, Camera, Upload, Trash2, Copy, Download, Check, X,
            ShieldCheck, Moon, Sun, RefreshCw, BarChart3, Heart, 
            Smile, Lightbulb, Users, Info, Cpu, Key, Lock, Settings, User, UserPlus, LogOut
        } = window.lucide || {
            Sparkles: () => <span>✨</span>, Camera: () => <span>📷</span>, Upload: () => <span>📤</span>,
            Trash2: () => <span>🗑️</span>, Copy: () => <span>📋</span>, Download: () => <span>💾</span>,
            ShieldCheck: () => <span>🛡️</span>, Moon: () => <span>🌙</span>, Sun: () => <span>☀️</span>,
            RefreshCw: () => <span>🔄</span>, BarChart3: () => <span>📊</span>, Heart: () => <span>❤️</span>,
            Smile: () => <span>😊</span>, Lightbulb: () => <span>💡</span>, Users: () => <span>👥</span>,
            Info: () => <span>ℹ️</span>, Cpu: () => <span>🤖</span>, Key: () => <span>🔑</span>,
            Lock: () => <span>🔒</span>, Settings: () => <span>⚙️</span>, User: () => <span>👤</span>,
            UserPlus: () => <span>👤+</span>, LogOut: () => <span>🚪</span>, Check: () => <span>✓</span>, X: () => <span>✗</span>
        };

        const ENCRYPTION_SALT = "SimaSecretSalt_2026";

        // تهيئة وإعدادات الفايربيس الأساسية المرجعية الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyD08ozxrWCBrbCsx3ayz8Gykyy4Z7v7UEU",
            authDomain: "sima-4378c.firebaseapp.com",
            projectId: "sima-4378c",
            storageBucket: "sima-4378c.firebasestorage.app",
            messagingSenderId: "978988425410",
            appId: "1:978988425410:web:ec6ab58c99fce16cec9b5b",
            measurementId: "G-BVXK2MD439"
        };

        if (firebase.apps.length === 0) {
            firebase.initializeApp(firebaseConfig);
            if ("measurementId" in firebaseConfig) {
                firebase.analytics();
            }
        }

        const LOADING_STEPS = [
            "جاري اكتشاف الوجه...",
            "استخراج النقاط المرجعية...",
            "تحليل تناسق الملامح...",
            "قياس زوايا الوجه...",
            "تحليل العينين...",
            "تحليل الأنف...",
            "تحليل الابتسامة..."
        ];

        const encryptData = (text) => {
            if (!text) return '';
            return CryptoJS.AES.encrypt(text, ENCRYPTION_SALT).toString();
        };

        const decryptData = (cipherText) => {
            if (!cipherText) return '';
            try {
                const bytes = CryptoJS.AES.decrypt(cipherText, ENCRYPTION_SALT);
                return bytes.toString(CryptoJS.enc.Utf8);
            } catch (e) {
                return '';
            }
        };

        function SimaApplication() {
            const [darkMode, setDarkMode] = React.useState(false);
            
            // إدارة الجلسات والدخول
            const [userRole, setUserRole] = React.useState(() => localStorage.getItem('sima_user_role') || null);
            const [currentUserName, setCurrentUserName] = React.useState(() => localStorage.getItem('sima_user_name') || '');
            const [currentView, setCurrentView] = React.useState('landing'); 
            
            // الحقول النصية للواجهات
            const [adminPasswordInput, setAdminPasswordInput] = React.useState('');
            const [memberNameInput, setMemberNameInput] = React.useState('');
            const [memberPasswordInput, setMemberPasswordInput] = React.useState('');
            
            // حقول التسجيل الجديد بالاسم وكلمة السر فقط
            const [regNameInput, setRegNameInput] = React.useState('');
            const [regPasswordInput, setRegPasswordInput] = React.useState('');

            // محاكاة قاعدة بيانات المستخدمين المحفوظة محلياً والمشفرة (سيتم ترحيلها للفايربيس عند ربط الـ Firestore)
            const [usersList, setUsersList] = React.useState(() => {
                const localData = localStorage.getItem('sima_users_db');
                return localData ? JSON.parse(localData) : [
                    { name: "تجربة عمار", password: "123", status: "active" }
                ];
            });

            const [keyType, setKeyType] = React.useState(() => localStorage.getItem('sima_key_type') || 'google-ai');
            const [apiKey, setApiKey] = React.useState(() => {
                const savedCipher = localStorage.getItem('sima_api_key_secure');
                return savedCipher ? decryptData(savedCipher) : '';
            });

            const [image, setImage] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [loadingStep, setLoadingStep] = React.useState(0);
            const [result, setResult] = React.useState(null);
            const [showAdminPanel, setShowAdminPanel] = React.useState(false);

            React.useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);

            React.useEffect(() => {
                let interval;
                if (loading) {
                    interval = setInterval(() => {
                        setLoadingStep((prev) => (prev + 1) % LOADING_STEPS.length);
                    }, 2000);
                } else {
                    setLoadingStep(0);
                }
                return () => clearInterval(interval);
            }, [loading]);

            // تحديث قاعدة البيانات في المتصفح تلقائياً عند تعديلها
            const saveUsersToDB = (updatedList) => {
                setUsersList(updatedList);
                localStorage.setItem('sima_users_db', JSON.stringify(updatedList));
            };

            const handleAdminLogin = () => {
                if (adminPasswordInput === 'salem1959') {
                    setUserRole('admin');
                    setCurrentUserName('المدير العام');
                    localStorage.setItem('sima_user_role', 'admin');
                    localStorage.setItem('sima_user_name', 'المدير العام');
                    setCurrentView('landing');
                    setAdminPasswordInput('');
                    setShowAdminPanel(true);
                } else {
                    alert('كلمة المرور الخاصة بالمدير غير صحيحة!');
                }
            };

            const handleMemberLogin = () => {
                const foundUser = usersList.find(u => u.name.trim() === memberNameInput.trim() && u.password === memberPasswordInput);
                
                if (foundUser) {
                    if (foundUser.status === 'pending') {
                        alert('حسابك قيد المراجعة حالياً! يرجى التواصل مع الإدارة لتفعيل حسابك أولاً.');
                        return;
                    }
                    setUserRole('member');
                    setCurrentUserName(foundUser.name);
                    localStorage.setItem('sima_user_role', 'member');
                    localStorage.setItem('sima_user_name', foundUser.name);
                    setCurrentView('landing');
                    setMemberNameInput('');
                    setMemberPasswordInput('');
                } else {
                    alert('اسم العضو أو كلمة المرور غير صحيحة، أو الحساب لم يتم تفعيله بعد.');
                }
            };

            const handleRegister = () => {
                if (!regNameInput.trim() || !regPasswordInput) {
                    alert('الرجاء تعبئة حقول الاسم وكلمة السر بالكامل.');
                    return;
                }

                const isExist = usersList.some(u => u.name.trim() === regNameInput.trim());
                if (isExist) {
                    alert('هذا الاسم مسجل مسبقاً، يرجى اختيار اسم مختلف.');
                    return;
                }

                // إضافة العضو الجديد بحالة معلقة (Pending) مشروطة بتفعيل المدير
                const newUser = {
                    name: regNameInput.trim(),
                    password: regPasswordInput,
                    status: 'pending' 
                };

                const updated = [...usersList, newUser];
                saveUsersToDB(updated);

                alert('تم تقديم طلب التسجيل بنجاح! حسابك بانتظار موافقة وتفعيل المدير العام لتتمكن من الدخول.');
                setCurrentView('landing');
                setRegNameInput('');
                setRegPasswordInput('');
            };

            const toggleUserStatus = (name) => {
                const updated = usersList.map(u => {
                    if (u.name === name) {
                        return { ...u, status: u.status === 'active' ? 'pending' : 'active' };
                    }
                    return u;
                });
                saveUsersToDB(updated);
            };

            const deleteUser = (name) => {
                if(confirm(`هل أنت متأكد من حذف الحساب: ${name}؟`)) {
                    const updated = usersList.filter(u => u.name !== name);
                    saveUsersToDB(updated);
                }
            };

            const handleLogout = () => {
                setUserRole(null);
                setCurrentUserName('');
                localStorage.removeItem('sima_user_role');
                localStorage.removeItem('sima_user_name');
                setCurrentView('landing');
                setShowAdminPanel(false);
            };

            const handleSaveSecureKey = (keyVal) => {
                setApiKey(keyVal);
                const cipher = encryptData(keyVal);
                localStorage.setItem('sima_api_key_secure', cipher);
                localStorage.setItem('sima_key_type', keyType);
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setImage(reader.result);
                        setResult(null);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const executeGeminiAnalysis = async () => {
                if (!image) return;
                if (!apiKey) {
                    alert('تنبيه: لم يتم تكوين مفتاح الذكاء الاصطناعي من قبل الإدارة بعد.');
                    return;
                }

                setLoading(true);
                try {
                    const base64Data = image.split(',')[1];
                    const mimeType = image.split(',')[0].match(/:(.*?);/)[1];

                    const prompt = `
                        قم بتحليل ملامح الوجه في هذه الصورة تحليلاً جمالياً وسلوكياً دقيقاً بناءً على المقاييس الظاهرة فقط.
                        يعاد الناتج بصيغة JSON فقط باللغة العربية.
                        {
                          "beauty": {
                            "score": 90,
                            "summary": "ملخص تحليلي بنيوي متناسق للملامح",
                            "strengths": ["نقطة التناظر الملحوظة", "توزيع الملامح المتناسق"],
                            "goldenRatio": "وصف فني للوجه والنسب الذهبية المتقاربة"،
                            "glow": "إشراقة ونضارة تقييمية للوجه"،
                            "tips": ["إرشاد العناية الأول", "إرشاد العناية الثاني"]
                          },
                          "expression": {
                            "expression": "التعبير الحالي الظاهر",
                            "firstImpression": "الانطباع السلوكي المنعكس"،
                            "traits": ["سمة مميزة أولى"],
                            "energy": "تحليل مستوى الطاقة والحضور"،
                            "communication": "أسلوب الانفتاح والتواصل المتوقع",
                            "suggestions": ["مؤشر انفعالي مقدر"],
                            "message": "رسالة تحفيزية ملهمة فريدة للمستخدم"
                          }
                        }
                    `;

                    let endpoint = keyType === 'google-ai' 
                        ? `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`
                        : `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
                    
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: mimeType, data: base64Data } }] }]
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const rawText = data.candidates[0].content.parts[0].text.trim();
                    const cleanJsonStr = rawText.replace(/^```json\s*/i, '').replace(/```$/, '').trim();
                    setResult(JSON.parse(cleanJsonStr));
                } catch (error) {
                    alert(`خطأ في المعالجة: ${error.message || 'يرجى التحقق من المفتاح المعتمد.'}`);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="relative overflow-x-hidden min-h-screen flex flex-col justify-between">
                    
                    <header className="relative z-10 border-b border-slate-200/60 dark:border-slate-800/60 backdrop-blur-md">
                        <div className="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <Cpu className="w-5 h-5 text-purple-600" />
                                <span className="text-xs font-bold text-slate-400">SIMA ADMIN-APPROVAL SYSTEM</span>
                            </div>
                            <div className="flex items-center gap-2">
                                {userRole === 'admin' && (
                                    <button 
                                        onClick={() => setShowAdminPanel(!showAdminPanel)}
                                        className="p-2 rounded-xl bg-purple-500/10 text-purple-600 border border-purple-500/20 text-xs font-bold flex items-center gap-1"
                                    >
                                        <Settings className="w-4 h-4" /> لوحة الإدارة
                                    </button>
                                )}
                                {userRole && (
                                    <button 
                                        onClick={handleLogout}
                                        className="p-2 rounded-xl bg-red-500/10 text-red-600 border border-red-500/20 text-xs font-bold flex items-center gap-1"
                                    >
                                        <LogOut className="w-4 h-4" /> خروج ({currentUserName})
                                    </button>
                                )}
                                <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-xl bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-slate-300">
                                    {darkMode ? <Sun className="w-4 h-4" /> : <Moon className="w-4 h-4" />}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="relative z-10 max-w-4xl mx-auto px-4 py-10 flex-grow w-full flex flex-col items-center justify-center">
                        
                        {/* البوابة الثلاثية للدخول والتسجيل */}
                        {!userRole && currentView === 'landing' && (
                            <section className="w-full max-w-md bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-6 shadow-xl text-center space-y-6">
                                <div>
                                    <h2 className="text-4xl font-black bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-transparent mb-2">منصة سِيما الذكية</h2>
                                    <p className="text-xs font-bold text-slate-400">نظام الدخول والتسجيل المشروط بموافقة الإدارة</p>
                                </div>
                                <div className="grid grid-cols-1 gap-3">
                                    <button onClick={() => setCurrentView('login_member')} className="p-3.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-right font-bold text-sm flex items-center justify-between hover:border-purple-500 transition-all">
                                        <span className="flex items-center gap-2"><User className="w-4 h-4 text-purple-500" /> دخول الأعضاء والمستخدمين</span>
                                        <span className="text-xs text-slate-400">←</span>
                                    </button>
                                    <button onClick={() => setCurrentView('login_admin')} className="p-3.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-right font-bold text-sm flex items-center justify-between hover:border-purple-500 transition-all">
                                        <span className="flex items-center gap-2"><Lock className="w-4 h-4 text-amber-500" /> بوابة الإدارة والتحكم (المدير)</span>
                                        <span className="text-xs text-slate-400">←</span>
                                    </button>
                                    <button onClick={() => setCurrentView('register')} className="p-3.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-right font-bold text-sm flex items-center justify-between hover:border-purple-500 transition-all">
                                        <span className="flex items-center gap-2"><UserPlus className="w-4 h-4 text-emerald-500" /> تسجيل حساب جديد (اسم وكلمة سر فقط)</span>
                                        <span className="text-xs text-slate-400">←</span>
                                    </button>
                                </div>
                            </section>
                        )}

                        {/* نماذج التبويب الثلاثي */}
                        {!userRole && currentView === 'login_admin' && (
                            <div className="w-full max-w-sm bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-md space-y-4">
                                <h3 className="font-bold text-base text-amber-500 flex items-center gap-1.5"><Lock className="w-4 h-4" /> تسجيل دخول المدير المسؤول</h3>
                                <input 
                                    type="password" placeholder="أدخل كلمة مرور المدير (salem1959)..." value={adminPasswordInput}
                                    onChange={(e) => setAdminPasswordInput(e.target.value)}
                                    className="w-full px-4 py-2 text-sm bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none"
                                />
                                <div className="flex gap-2">
                                    <button onClick={handleAdminLogin} className="w-full py-2 bg-purple-600 text-white font-bold rounded-xl text-xs">تأكيد الدخول</button>
                                    <button onClick={() => setCurrentView('landing')} className="w-full py-2 bg-slate-100 dark:bg-slate-950 text-slate-500 font-bold rounded-xl text-xs">إلغاء</button>
                                </div>
                            </div>
                        )}

                        {!userRole && currentView === 'login_member' && (
                            <div className="w-full max-w-sm bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-md space-y-4">
                                <h3 className="font-bold text-base text-purple-600 flex items-center gap-1.5"><User className="w-4 h-4" /> تسجيل دخول الأعضاء</h3>
                                <div className="space-y-3">
                                    <input 
                                        type="text" placeholder="الاسم الكامل المسجل..." value={memberNameInput}
                                        onChange={(e) => setMemberNameInput(e.target.value)}
                                        className="w-full px-4 py-2 text-sm bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none"
                                    />
                                    <input 
                                        type="password" placeholder="كلمة السر..." value={memberPasswordInput}
                                        onChange={(e) => setMemberPasswordInput(e.target.value)}
                                        className="w-full px-4 py-2 text-sm bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none"
                                    />
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={handleMemberLogin} className="w-full py-2 bg-purple-600 text-white font-bold rounded-xl text-xs">دخول</button>
                                    <button onClick={() => setCurrentView('landing')} className="w-full py-2 bg-slate-100 dark:bg-slate-950 text-slate-500 font-bold rounded-xl text-xs">إلغاء</button>
                                </div>
                            </div>
                        )}

                        {!userRole && currentView === 'register' && (
                            <div className="w-full max-w-sm bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-md space-y-4">
                                <h3 className="font-bold text-base text-emerald-500 flex items-center gap-1.5"><UserPlus className="w-4 h-4" /> طلب تسجيل عضوية جديدة</h3>
                                <div className="space-y-3">
                                    <input 
                                        type="text" placeholder="الاسم الكامل (سيظهر للإدارة)..." value={regNameInput}
                                        onChange={(e) => setRegNameInput(e.target.value)}
                                        className="w-full px-4 py-2 text-sm bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none"
                                    />
                                    <input 
                                        type="password" placeholder="اختر كلمة السر الخاصة بك..." value={regPasswordInput}
                                        onChange={(e) => setRegPasswordInput(e.target.value)}
                                        className="w-full px-4 py-2 text-sm bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none"
                                    />
                                </div>
                                <div className="bg-amber-500/10 p-3 rounded-xl border border-amber-500/20 text-[11px] text-amber-700 dark:text-amber-300">
                                    ⚠ بمجرد الضغط على إنشاء، سيتم إرسال حسابك للإدارة للمراجعة والتفعيل قبل أن تتمكن من تسجيل الدخول.
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={handleRegister} className="w-full py-2 bg-emerald-600 text-white font-bold rounded-xl text-xs">إرسال طلب التسجيل</button>
                                    <button onClick={() => setCurrentView('landing')} className="w-full py-2 bg-slate-100 dark:bg-slate-950 text-slate-500 font-bold rounded-xl text-xs">رجوع</button>
                                </div>
                            </div>
                        )}

                        {/* لوحة تحكم المدير المعززة (المفاتيح + تفعيل وفرملة طلبات الأعضاء) */}
                        {userRole === 'admin' && showAdminPanel && (
                            <section className="w-full bg-white dark:bg-slate-900 border-2 border-purple-500/30 rounded-3xl p-5 mb-6 shadow-md space-y-5 text-right">
                                <div className="border-b border-slate-100 dark:border-slate-800 pb-2 flex justify-between items-center">
                                    <h3 className="font-black text-sm text-purple-600 flex items-center gap-1.5"><Settings className="w-4 h-4" /> لوحة تحكم المدير العام والأعضاء</h3>
                                    <span className="text-[10px] px-2 py-0.5 bg-purple-500/10 text-purple-600 font-bold rounded-md">رمز المرور المعتمد الفعال</span>
                                </div>
                                
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-slate-50 dark:bg-slate-950 p-4 rounded-2xl border border-slate-200 dark:border-slate-800">
                                    <div>
                                        <span className="block text-[11px] font-bold text-slate-400 mb-1">نوع بنية المفتاح المستعمل:</span>
                                        <select 
                                            value={keyType} 
                                            onChange={(e) => { setKeyType(e.target.value); localStorage.setItem('sima_key_type', e.target.value); }}
                                            className="w-full px-3 py-2 text-xs bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl"
                                        >
                                            <option value="google-ai">مفتاح استوديو الذكاء الاصطناعي التقليدي (AIza)</option>
                                            <option value="google-cloud">مفاتيح السحابة والمحركات المحدثة الأحدث v1</option>
                                        </select>
                                    </div>
                                    <div>
                                        <span className="block text-[11px] font-bold text-slate-400 mb-1">رمز المفتاح السري (Gemini API Key):</span>
                                        <input 
                                            type="password" placeholder="مفتاح الذكاء محمي ومشفر تلقائياً..." value={apiKey}
                                            onChange={(e) => handleSaveSecureKey(e.target.value)}
                                            className="w-full px-4 py-2 text-xs bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-left font-mono focus:outline-none"
                                        />
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <span className="block text-[11px] font-bold text-slate-400 flex items-center gap-1"><Users className="w-3.5 h-3.5 text-purple-500" /> إدارة تفعيل وحظر الأعضاء المسجلين:</span>
                                    <div className="overflow-x-auto border border-slate-100 dark:border-slate-800 rounded-xl">
                                        <table className="w-full text-right border-collapse text-xs">
                                            <thead>
                                                <tr className="bg-slate-50 dark:bg-slate-950 text-slate-400 font-bold border-b border-slate-100 dark:border-slate-800">
                                                    <th className="p-3">اسم العضو المتقدم</th>
                                                    <th className="p-3">كلمة السر</th>
                                                    <th className="p-3">الحالة الحالية</th>
                                                    <th className="p-3 text-center">الإجراءات والتحكم</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {usersList.map((user, idx) => (
                                                    <tr key={idx} className="border-b border-slate-100 dark:border-slate-800 last:border-0 hover:bg-slate-50/50 dark:hover:bg-slate-950/20">
                                                        <td className="p-3 font-bold">{user.name}</td>
                                                        <td className="p-3 font-mono text-slate-400">{user.password}</td>
                                                        <td className="p-3">
                                                            <span className={`px-2 py-0.5 rounded-md font-bold text-[10px] ${user.status === 'active' ? 'bg-emerald-500/10 text-emerald-600' : 'bg-amber-500/10 text-amber-600'}`}>
                                                                {user.status === 'active' ? '✔ مفعّل ونشط' : '⏳ معلق بانتظارك'}
                                                            </span>
                                                        </td>
                                                        <td className="p-3 flex items-center justify-center gap-2">
                                                            <button 
                                                                onClick={() => toggleUserStatus(user.name)}
                                                                className={`p-1.5 rounded-lg border font-bold text-[10px] flex items-center gap-0.5 ${user.status === 'active' ? 'bg-amber-500/10 text-amber-600 border-amber-500/20' : 'bg-emerald-500/10 text-emerald-600 border-emerald-500/20'}`}
                                                            >
                                                                {user.status === 'active' ? <X className="w-3 h-3" /> : <Check className="w-3 h-3" />}
                                                                {user.status === 'active' ? 'تعليق الحساب' : 'تفعيل العضو'}
                                                            </button>
                                                            <button 
                                                                onClick={() => deleteUser(user.name)}
                                                                className="p-1.5 bg-red-500/10 text-red-600 border border-red-500/20 rounded-lg text-[10px]"
                                                            >
                                                                حذف نهائي
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                                {usersList.length === 0 && (
                                                    <tr>
                                                        <td colSpan="4" className="p-4 text-center text-slate-400">لا يوجد أي طلبات تسجيل أو أعضاء حالياً.</td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </section>
                        )}

                        {/* واجهة الفحص والتحليل لربط الصور بالذكاء الاصطناعي (تفتح فقط لمن يملك جلسة دور نشطة) */}
                        {userRole && (
                            <div className="w-full space-y-6">
                                <section className="text-center mb-2">
                                    <h1 className="text-5xl font-black bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-transparent">سِيما</h1>
                                    <p className="text-xs font-bold text-slate-500 mt-1">مرحباً بك: <span className="text-purple-600 font-black">{currentUserName}</span>. نظام معالجة ملامح الوجه جاهز للعمل.</p>
                                </section>

                                <section className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-6 shadow-md">
                                    {!image ? (
                                        <div className="border-2 border-dashed rounded-2xl p-8 text-center cursor-pointer border-slate-300 dark:border-slate-700 hover:border-purple-500 bg-slate-50/50 dark:bg-slate-950/20 relative">
                                            <input type="file" accept="image/*" onChange={handleFileChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                            <div className="w-12 h-12 mx-auto mb-3 bg-purple-500/10 text-purple-600 rounded-full flex items-center justify-center"><Upload className="w-5 h-5" /></div>
                                            <h3 className="text-sm font-bold mb-1">اضغط هنا لتصفح ملفات جهازك واختيار الصورة للتحليل</h3>
                                        </div>
                                    ) : (
                                        <div className="relative rounded-2xl overflow-hidden bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800">
                                            <img src={image} alt="Face Preview" className="max-h-[300px] w-full object-contain mx-auto" />
                                            <div className="absolute bottom-4 right-4 left-4 flex justify-between items-center gap-2">
                                                <button onClick={() => { setImage(null); setResult(null); }} className="px-4 py-2 bg-red-600 text-white rounded-xl shadow-md font-bold text-xs flex items-center gap-1.5"><Trash2 className="w-4 h-4" /> حذف الصورة</button>
                                                {!result && !loading && <button onClick={executeGeminiAnalysis} className="px-5 py-2.5 bg-purple-600 text-white rounded-xl shadow-lg font-bold flex items-center gap-1.5 text-xs"><Sparkles className="w-4 h-4" /> ابدأ التحليل وفك الشفرات</button>}
                                            </div>
                                        </div>
                                    )}
                                </section>

                                {loading && (
                                    <section className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-6 shadow-md text-center">
                                        <RefreshCw className="w-8 h-8 text-purple-500 animate-spin mx-auto mb-2" />
                                        <h3 className="text-sm font-bold mb-1">مصفوفة هندسة المؤشرات الحيوية تعمل الآن</h3>
                                        <p className="text-purple-600 font-bold text-xs">{LOADING_STEPS[loadingStep]}</p>
                                    </section>
                                )}

                                {result && !loading && (
                                    <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-6 shadow-md space-y-4">
                                        <div className="border-b border-slate-100 dark:border-slate-800 pb-3 text-right">
                                            <div className="text-xs font-bold text-purple-600">درجة التناسق التقريبية: {result.beauty.score}/100</div>
                                            <h3 className="text-lg font-bold mt-1">التقرير البنيوي الشامل للوجه</h3>
                                            <p className="text-xs text-slate-600 dark:text-slate-400 mt-1 leading-relaxed">{result.beauty.summary}</p>
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-right">
                                            <div className="p-3 bg-slate-50 dark:bg-slate-950 rounded-xl">
                                                <h4 className="font-bold text-xs text-slate-400 mb-1">النسب الذهبية والتقارب البنيوي</h4>
                                                <p className="text-xs text-slate-600 dark:text-slate-400">{result.beauty.goldenRatio}</p>
                                            </div>
                                            <div className="p-3 bg-slate-50 dark:bg-slate-950 rounded-xl">
                                                <h4 className="font-bold text-xs text-slate-400 mb-1">الانطباع السلوكي الأول المتوقع</h4>
                                                <p className="text-xs text-slate-600 dark:text-slate-400">{result.expression.firstImpression}</p>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                    </main>

                    <footer className="w-full bg-slate-950 text-slate-400 border-t border-slate-900 text-center py-6 px-4 space-y-2 mt-12">
                        <div className="text-xs md:text-sm font-medium text-slate-300">
                            تم التصميم والتطوير بواسطة <span className="text-white font-bold tracking-wide">الدكتور زكريا محمد عطوني</span> © 2026
                        </div>
                    </footer>

                </div>
            );
        }

        const container = document.getElementById('sima-app-root');
        const root = ReactDOM.createRoot(container);
        root.render(<SimaApplication />);
    </script>
</body>
</html>
